
<!DOCTYPE html>
<html>
<head>
<meta name=viewport content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;background:#0b1f3a;color:#fff;margin:0}
.top{padding:10px;background:#1f3b73}
.grid{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;padding:10px}
.cell{padding:10px;border-radius:6px;text-align:center;font-size:12px;cursor:pointer}
.vazio{background:#ecf0f1;color:#000}
.ocupado{background:#2ecc71}
.fixo{background:#e67e22}
</style>
</head>
<body>

<div class=top>
<button onclick="sugerir()">Sugerir endereço</button>
</div>

<div id=grid class=grid></div>

<script>
async function load(){
 const estoque=await fetch('/api/estoque').then(r=>r.json())
 const fixos=await fetch('/api/fixos').then(r=>r.json())

 let mapa={}
 estoque.forEach(i=>mapa[i.endereco]=i)
 fixos.forEach(i=>mapa[i.endereco]={fixo:true,produto:i.produto})

 let html=''
 for(let i=1;i<=30;i++){
   let pos=String(i).padStart(3,'0')
   let addr='01-'+pos+'-1-1'

   if(mapa[addr]?.fixo){
     html+=`<div class="cell fixo" onclick="info('${addr}')">${pos}</div>`
   } else if(mapa[addr]){
     html+=`<div class="cell ocupado" onclick="info('${addr}')">${pos}</div>`
   } else {
     html+=`<div class="cell vazio" onclick="mov('${addr}')">${pos}</div>`
   }
 }
 grid.innerHTML=html
}

function info(addr){
 fetch('/api/estoque').then(r=>r.json()).then(data=>{
  let i=data.find(x=>x.endereco===addr)
  alert(addr+'\n'+(i?i.nome+' qtd:'+i.qtd:'vazio'))
 })
}

function mov(addr){
 let nome=prompt('Produto')
 let qtd=prompt('Qtd')
 fetch('/api/estoque',{method:'POST',headers:{'Content-Type':'application/json'},
 body:JSON.stringify({nome,qtd,endereco:addr})}).then(load)
}

function sugerir(){
 fetch('/api/sugerir').then(r=>r.json()).then(d=>{
  alert('Sugestão: '+d.endereco)
 })
}

load()
</script>

</body>
</html>
