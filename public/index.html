
<!DOCTYPE html>
<html>
<head>
<meta name=viewport content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;background:#0b1f3a;color:#fff;margin:0}
.menu{padding:10px;background:#1f3b73}
button{width:100%;margin:5px 0;padding:15px;border:none;border-radius:10px;background:#3b5bbf;color:#fff}
.card{background:#1a2f5c;margin:10px;padding:15px;border-radius:10px}
input{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none}
</style>
</head>
<body>

<div class=menu>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('produtos')">Produtos</button>
<button onclick="show('estoque')">Estoque</button>
</div>

<div id=content></div>

<script>
async function api(u,o){return fetch(u,o).then(r=>r.json())}

async function show(m){
 if(m==='dashboard'){
  const d=await api('/api/dashboard')
  content.innerHTML=`<div class=card>
  Produtos:${d.produtos}<br>
  Estoque:${d.estoque}<br>
  Pedidos:${d.pedidos}</div>`
 }

 if(m==='produtos'){
  const l=await api('/api/produtos')
  content.innerHTML=`<div class=card>
  <input id=n placeholder=nome>
  <button onclick=add()>Salvar</button>
  ${l.map(i=>`<div>${i.nome}</div>`).join('')}
  </div>`
 }

 if(m==='estoque'){
  const l=await api('/api/estoque')
  const h=await api('/api/historico')
  content.innerHTML=`<div class=card>
  <input id=p placeholder=produto>
  <input id=q placeholder=quantidade>
  <button onclick=mov()>Movimentar</button>

  <h3>Estoque</h3>
  ${l.map(i=>`<div>${i.nome}: ${i.qtd}</div>`).join('')}

  <h3>Histórico</h3>
  ${h.map(i=>`<div>${i.nome} ${i.qtd}</div>`).join('')}
  </div>`
 }
}

function add(){
 api('/api/produtos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nome:n.value})}).then(()=>show('produtos'))
}

function mov(){
 api('/api/estoque',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nome:p.value,qtd:q.value})}).then(()=>show('estoque'))
}

show('dashboard')
</script>
</body>
</html>
