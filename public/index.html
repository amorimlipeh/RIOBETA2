
<!DOCTYPE html>
<html>
<head>
<meta name=viewport content="width=device-width, initial-scale=1">
<style>
body{background:#0b1f3a;color:#fff;font-family:Arial}
.box{padding:20px}
input,button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px}
button{background:#3b5bbf;color:#fff}
</style>
</head>
<body>

<div class=box>
<h2>Login</h2>
<input id=l placeholder=login>
<input id=s placeholder=senha>
<button onclick=login()>Entrar</button>

<h3>Criar usuário</h3>
<input id=nl placeholder=login>
<input id=ns placeholder=senha>
<button onclick=create()>Criar</button>

<button onclick=test()>Testar rota protegida</button>
</div>

<script>
let token=''

function login(){
 fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
 body:JSON.stringify({login:l.value,senha:s.value})})
 .then(r=>r.json()).then(d=>{
  if(d.ok){ token=d.token; alert('Logado') }
  else alert('Erro')
 })
}

function create(){
 fetch('/api/user',{method:'POST',headers:{'Content-Type':'application/json'},
 body:JSON.stringify({login:nl.value,senha:ns.value})})
}

function test(){
 fetch('/api/protected',{headers:{authorization:token}})
 .then(r=>r.json()).then(d=>alert(JSON.stringify(d)))
}
</script>

</body>
</html>
