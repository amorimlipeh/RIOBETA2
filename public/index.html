<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIO BETA 2</title>

<style>
body{
margin:0;
font-family:Arial;
background:#020817;
color:#fff;
}

.card{
background:#1e293b;
padding:20px;
margin:15px;
border-radius:20px;
}

input,select,button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-size:16px;
}

input,select{
background:#020617;
color:#fff;
}

button{
background:#2563eb;
color:#fff;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.badge{
padding:6px 12px;
border-radius:30px;
font-size:12px;
font-weight:bold;
display:inline-block;
}

.verde{background:#16a34a;}
.amarelo{background:#ca8a04;}
.vermelho{background:#dc2626;}
.roxo{background:#9333ea;}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:10px;
text-align:left;
border-bottom:1px solid rgba(255,255,255,.1);
}

.cancelado{
opacity:.5;
text-decoration:line-through;
}

h2{
margin:0 0 15px 0;
}
</style>
</head>
<body>

<div class="card">
<h2>Nova Movimentação</h2>

<select id="produtoSelect"></select>

<select id="tipoMov">
<option value="entrada">Entrada</option>
<option value="saida">Saída</option>
<option value="ajuste">Ajuste</option>
</select>

<input id="enderecoMov" placeholder="Endereço">
<input id="quantidadeMov" type="number" placeholder="Quantidade">

<button onclick="salvarMov()">Salvar Movimentação</button>
</div>


<div class="card">
<h2>Transferência entre Endereços</h2>

<select id="produtoTransfer"></select>

<input id="origemTransfer" placeholder="Origem">
<input id="destinoTransfer" placeholder="Destino">
<input id="quantidadeTransfer" type="number" placeholder="Quantidade">

<button onclick="transferir()">Transferir</button>
</div>


<div class="card">
<h2>Últimas Movimentações</h2>

<table>
<thead>
<tr>
<th>Tipo</th>
<th>Produto</th>
<th>Qtd</th>
<th>Status</th>
<th>Ação</th>
</tr>
</thead>
<tbody id="movBody"></tbody>
</table>
</div>


<script>
let produtos=[];

async function carregarProdutos(){
const res=await fetch('/api/produtos');
produtos=await res.json();

const html=produtos.map(p=>
`<option value="${p.id}">${p.nome}</option>`
).join('');

document.getElementById('produtoSelect').innerHTML=html;
document.getElementById('produtoTransfer').innerHTML=html;
}

async function salvarMov(){
await fetch('/api/estoque/movimentar',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
produtoId:produtoSelect.value,
tipo:tipoMov.value,
endereco:enderecoMov.value,
quantidade:Number(quantidadeMov.value)
})
});

location.reload();
}

async function transferir(){
await fetch('/api/estoque/transferir',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
produtoId:produtoTransfer.value,
origem:origemTransfer.value,
destino:destinoTransfer.value,
quantidade:Number(quantidadeTransfer.value)
})
});

location.reload();
}

async function cancelarMov(id){
await fetch('/api/movimentacoes/'+id+'/cancelar',{
method:'PUT'
});

location.reload();
}

async function carregarMovs(){
const res=await fetch('/api/movimentacoes');
const movs=await res.json();

movBody.innerHTML=movs.map(m=>{

const produto=produtos.find(p=>p.id==m.produtoId);

return `
<tr class="${m.status==='cancelado'?'cancelado':''}">
<td>${m.tipo}</td>
<td>${produto?.nome||'-'}</td>
<td>${m.quantidade}</td>
<td>
<span class="badge ${m.status==='ativo'?'verde':'vermelho'}">
${m.status}
</span>
</td>
<td>
${m.status==='ativo'
? `<button onclick="cancelarMov('${m.id}')">Cancelar</button>`
: '-'}
</td>
</tr>
`;

}).join('');
}

async function init(){
await carregarProdutos();
await carregarMovs();
}

init();
</script>

</body>
</html>
