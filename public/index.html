<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Logístico de Operação</title>

<link rel="stylesheet" href="/css/core.css">
<link rel="stylesheet" href="/css/layout.css">
<link rel="stylesheet" href="/css/theme.css">
<link rel="stylesheet" href="/css/components.css">
</head>
<body>

<div class="app-shell">

<aside class="sidebar">
<div class="brand">
<div class="brand-icon">SLO</div>
<div>
<h2>SISTEMA LOGÍSTICO</h2>
<p>DE OPERAÇÃO</p>
</div>
</div>

<nav class="menu">
<button class="menu-item active">Dashboard</button>
<button class="menu-item">Produtos</button>
<button class="menu-item">Estoque</button>
<button class="menu-item">Pedidos</button>
<button class="menu-item">Scanner</button>
<button class="menu-item">WMS</button>
</nav>
</aside>

<main class="main-content">

<header class="topbar">
<input class="search" placeholder="Pesquisar...">
<div id="clock">--:--</div>
</header>

<section class="workspace">

<div class="hero-card">
<h1>Bem-vindo ao Sistema</h1>
<p>Build 1 Enterprise</p>
</div>

<div class="grid-cards">
<div class="stat-card">Produtos</div>
<div class="stat-card">Pedidos</div>
<div class="stat-card">Estoque</div>
<div class="stat-card">WMS</div>
</div>

</section>

</main>

</div>

<script src="/js/core/layout.js"></script>

</body>
</html>
