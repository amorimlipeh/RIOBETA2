
<!DOCTYPE html>
<html>
<head>
<meta name=viewport content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;background:#0b1f3a;color:#fff;margin:0}
.box{padding:20px}
input{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none}
button{padding:12px;border:none;border-radius:8px;background:#3b5bbf;color:#fff;width:100%}
.card{background:#1a2f5c;padding:15px;border-radius:10px;margin-top:10px}
</style>
</head>
<body>

<div class=box>
<h2>Picking</h2>

<input id=prod placeholder="Digite produto">
<button onclick="buscar()">Buscar</button>

<div id=result></div>

</div>

<script>
async function buscar(){
 const nome=prod.value
 const r=await fetch('/api/picking/'+nome).then(r=>r.json())

 if(!r.ok){
   result.innerHTML='<div class=card>Produto não encontrado</div>'
   return
 }

 result.innerHTML=`<div class=card>
 Produto: ${r.nome}<br>
 Endereço: ${r.endereco}<br>
 Quantidade: ${r.qtd}<br><br>

 <input id=qtd placeholder="Qtd retirar">
 <button onclick="retirar('${r.nome}','${r.endereco}')">Confirmar retirada</button>
 </div>`
}

function retirar(nome,endereco){
 fetch('/api/retirar',{
   method:'POST',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({nome,endereco,qtd:qtd.value})
 }).then(()=>buscar())
}
</script>

</body>
</html>
