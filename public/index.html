
<!DOCTYPE html>
<html>
<body style="background:#082247;color:#fff;font-family:Arial">
<h2>Login</h2>
<input id=l placeholder=login><br><br>
<input id=s placeholder=senha><br><br>
<button onclick=login()>Entrar</button>
<button onclick=reg()>Criar conta</button>

<script>
async function login(){
 let r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login:l.value,senha:s.value})});
 let d=await r.json();
 alert(d.ok?'OK':'Erro login');
}
async function reg(){
 let r=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login:l.value,senha:s.value})});
 let d=await r.json();
 alert(d.ok?'Criado':'Erro');
}
</script>
</body>
</html>
