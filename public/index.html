
<!DOCTYPE html>
<html>
<head>
<meta name=viewport content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;background:#0b1f3a;color:#fff;margin:0}
.box{padding:20px}
.card{background:#1a2f5c;padding:15px;border-radius:10px;margin:10px 0}
.green{color:#2ecc71}
.blue{color:#3498db}
.yellow{color:#f1c40f}
button{padding:10px;border:none;border-radius:8px;background:#3b5bbf;color:#fff}
</style>
</head>
<body>

<div class=box>
<h2>Painel Operacional</h2>

<input id=nome placeholder="Nome operador">
<input id=end placeholder="Endereço">
<button onclick="start()">Iniciar Operação</button>

<div id=painel></div>

</div>

<script>
async function load(){
 const data=await fetch('/api/painel').then(r=>r.json())
 painel.innerHTML=data.map(o=>`
 <div class=card>
 👷 ${o.nome}<br>
 📍 ${o.endereco}<br>
 ⏱️ ${o.tempo}s<br>
 <span class="${o.status=='andamento'?'green':'blue'}">${o.status}</span><br>
 <button onclick="finalizar(${o.id})">Finalizar</button>
 </div>
 `).join('')
}

function start(){
 fetch('/api/iniciar',{method:'POST',headers:{'Content-Type':'application/json'},
 body:JSON.stringify({nome:nome.value,endereco:end.value})}).then(load)
}

function finalizar(id){
 fetch('/api/finalizar',{method:'POST',headers:{'Content-Type':'application/json'},
 body:JSON.stringify({id})}).then(load)
}

setInterval(load,1000)
load()
</script>

</body>
</html>
