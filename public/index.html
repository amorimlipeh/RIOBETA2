<!-- INICIO MODAL ESCOLHA EDICAO LIMPO -->
<script>
(function () {
    let itemSelecionadoEdicao = null;

    function garantirModalEscolhaEdicao() {
        let modal = document.getElementById("modalEscolhaEdicao");
        if (modal) return modal;

        modal = document.createElement("div");
        modal.id = "modalEscolhaEdicao";
        modal.innerHTML = `
            <div class="modal-box">
                <h3>Selecionar Tipo de Edição</h3>
                <p>O que deseja editar?</p>
                <div class="modal-buttons">
                    <button type="button" class="btn-azul" id="btnEditarMovimentacao">Editar Movimentação</button>
                    <button type="button" class="btn-verde" id="btnEditarTransferencia">Editar Transferência</button>
                    <button type="button" class="btn-vermelho" id="btnCancelarEscolhaEdicao">Cancelar</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);

        modal.addEventListener("click", function(e){
            if (e.target === modal) fecharModalEscolhaEdicao();
        });

        modal.querySelector("#btnCancelarEscolhaEdicao").addEventListener("click", fecharModalEscolhaEdicao);

        modal.querySelector("#btnEditarMovimentacao").addEventListener("click", function(){
            const item = itemSelecionadoEdicao;
            fecharModalEscolhaEdicao();
            if (!item) return;
            if (typeof window.abrirFormularioEditarMovimentacao === "function") return window.abrirFormularioEditarMovimentacao(item);
            if (typeof window.editarMovimentacao === "function") return window.editarMovimentacao(item);
            if (typeof window.editarItem === "function") return window.editarItem(item);
        });

        modal.querySelector("#btnEditarTransferencia").addEventListener("click", function(){
            const item = itemSelecionadoEdicao;
            fecharModalEscolhaEdicao();
            if (!item) return;
            if (typeof window.abrirFormularioEditarTransferencia === "function") return window.abrirFormularioEditarTransferencia(item);
            if (typeof window.editarTransferencia === "function") return window.editarTransferencia(item);
            if (typeof window.editarItem === "function") return window.editarItem(item);
        });

        return modal;
    }

    window.abrirModalEscolhaEdicao = function(item){
        itemSelecionadoEdicao = item || null;
        garantirModalEscolhaEdicao().classList.add("ativo");
    };

    window.fecharModalEscolhaEdicao = function(){
        const modal = document.getElementById("modalEscolhaEdicao");
        if (modal) modal.classList.remove("ativo");
        itemSelecionadoEdicao = null;
    };
})();
</script>
<!-- FIM MODAL ESCOLHA EDICAO LIMPO -->

<!-- INICIO INTERCEPT EDITAR ESTOQUE -->
<script>
(function(){

document.addEventListener("click",function(e){

    const botao = e.target.closest("button");

    if(!botao) return;

    if(botao.innerText.trim() !== "Editar") return;

    e.preventDefault();
    e.stopImmediatePropagation();

    let linhaAtual = botao.closest("tr") || botao.closest(".linha") || botao.closest(".card");

    window.itemSelecionadoEdicaoGlobal = linhaAtual;

    abrirModalEscolhaEdicaoCustom();

},true);


window.abrirModalEscolhaEdicaoCustom = function(){

    let modal = document.getElementById("modalEscolhaTipoEdicao");

    if(!modal){

        modal = document.createElement("div");
        modal.id = "modalEscolhaTipoEdicao";

        modal.style = `
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.75);
            display:flex;
            align-items:center;
            justify-content:center;
            z-index:999999;
        `;

        modal.innerHTML = `
            <div style="
                background:#1e293b;
                padding:25px;
                border-radius:15px;
                width:90%;
                max-width:400px;
                text-align:center;
                box-shadow:0 0 25px rgba(0,0,0,.4);
            ">
                <h2 style="color:white;margin-bottom:10px;">
                    Selecione o Tipo de Edição
                </h2>

                <p style="color:#cbd5e1;margin-bottom:20px;">
                    O que deseja editar?
                </p>

                <button id="btnEscolhaMov" style="
                    width:100%;
                    margin-bottom:10px;
                    padding:14px;
                    border:none;
                    border-radius:10px;
                    background:#2563eb;
                    color:white;
                    font-weight:bold;
                ">
                    Editar Movimentação
                </button>

                <button id="btnEscolhaTransf" style="
                    width:100%;
                    margin-bottom:10px;
                    padding:14px;
                    border:none;
                    border-radius:10px;
                    background:#16a34a;
                    color:white;
                    font-weight:bold;
                ">
                    Editar Transferência
                </button>

                <button id="btnFecharEscolha" style="
                    width:100%;
                    padding:14px;
                    border:none;
                    border-radius:10px;
                    background:#dc2626;
                    color:white;
                    font-weight:bold;
                ">
                    Cancelar
                </button>
            </div>
        `;

        document.body.appendChild(modal);

        document.getElementById("btnFecharEscolha").onclick = ()=>{

            modal.remove();

        };

        document.getElementById("btnEscolhaMov").onclick = ()=>{

            modal.remove();

            if(typeof editarMovimentacao==="function"){
                editarMovimentacao(window.itemSelecionadoEdicaoGlobal);
            }
            else if(typeof editarItem==="function"){
                editarItem(window.itemSelecionadoEdicaoGlobal);
            }

        };

        document.getElementById("btnEscolhaTransf").onclick = ()=>{

            modal.remove();

            if(typeof editarTransferencia==="function"){
                editarTransferencia(window.itemSelecionadoEdicaoGlobal);
            }
            else{
                alert("Função editarTransferencia ainda não encontrada.");
            }

        };

    }

};

})();
</script>
<!-- FIM INTERCEPT EDITAR ESTOQUE -->

</body>
