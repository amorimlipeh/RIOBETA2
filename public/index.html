
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;background:#0b1f3a;color:#fff;margin:0}
.menu{padding:10px;background:#1f3b73}
button{width:100%;margin:5px 0;padding:15px;border:none;border-radius:10px;background:#3b5bbf;color:#fff}
.card{background:#1a2f5c;margin:10px;padding:15px;border-radius:10px}
</style>
</head>
<body>

<div class="menu">
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('produtos')">Produtos</button>
<button onclick="show('estoque')">Estoque</button>
<button onclick="show('pedidos')">Pedidos</button>
</div>

<div id="content"></div>

<script>
function show(m){
  if(m==='dashboard'){
    document.getElementById('content').innerHTML=`<div class="card">🚀 Dashboard ativo</div>`;
  }
  if(m==='produtos'){
    document.getElementById('content').innerHTML=`
    <div class="card">
      <input id="p" placeholder="Produto">
      <button onclick="addProd()">Salvar</button>
    </div>`;
  }
  if(m==='estoque'){
    document.getElementById('content').innerHTML=`
    <div class="card">
      <input id="e" placeholder="Quantidade">
      <button onclick="addEst()">Salvar</button>
    </div>`;
  }
  if(m==='pedidos'){
    document.getElementById('content').innerHTML=`
    <div class="card">
      <input id="pd" placeholder="Pedido">
      <button onclick="addPed()">Salvar</button>
    </div>`;
  }
}

function addProd(){
 fetch('/api/produtos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nome:document.getElementById('p').value})});
}
function addEst(){
 fetch('/api/estoque',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({qtd:document.getElementById('e').value})});
}
function addPed(){
 fetch('/api/pedidos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pedido:document.getElementById('pd').value})});
}
show('dashboard');
</script>

</body>
</html>
