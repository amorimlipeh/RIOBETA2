<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Logístico de Operação</title>

<link rel="stylesheet" href="/css/core.css">
<link rel="stylesheet" href="/css/layout.css">
<link rel="stylesheet" href="/css/theme.css">
<link rel="stylesheet" href="/css/components.css">
</head>
<body>

<div class="mobile-overlay" id="mobileOverlay"></div>

<div class="app-shell">

  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-icon">SLO</div>
      <div>
        <h2>SISTEMA LOGÍSTICO</h2>
        <p>DE OPERAÇÃO</p>
      </div>
    </div>

    <nav class="menu">
      <button class="menu-item active" data-view="dashboard"><span class="menu-icon">🏠</span><span>Dashboard</span></button>
      <button class="menu-item" data-view="produtos"><span class="menu-icon">📦</span><span>Produtos</span></button>
      <button class="menu-item" data-view="estoque"><span class="menu-icon">📊</span><span>Estoque</span></button>
      <button class="menu-item" data-view="pedidos"><span class="menu-icon">🧾</span><span>Pedidos</span></button>
      <button class="menu-item" data-view="scanner"><span class="menu-icon">📷</span><span>Scanner</span></button>
      <button class="menu-item" data-view="wms"><span class="menu-icon">🗺️</span><span>WMS</span></button>
    </nav>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        <input class="search" placeholder="Pesquisar...">
      </div>
      <div id="clock" class="clock-badge">--:--</div>
    </header>

    <section class="workspace" id="workspace"></section>
  </main>
</div>

<script src="/js/core/layout.js"></script>
<script src="/js/core/router.js"></script>
<script src="/js/core/mobile-menu.js"></script>

</div>
<!-- INICIO MODAL ESCOLHA EDICAO DINAMICO -->
<script>
(function(){
    let itemSelecionadoEdicao = null;

    function garantirModalEscolhaEdicao(){
        let modal = document.getElementById("modalEscolhaEdicao");
        if(modal) return modal;

        modal = document.createElement("div");
        modal.id = "modalEscolhaEdicao";
        modal.innerHTML = `
            <div class="modal-box">
                <h3>Selecionar Tipo de Edição</h3>
                <p>O que deseja editar?</p>
                <div class="modal-buttons">
                    <button class="btn-azul" id="btnEditarMovimentacao">Editar Movimentação</button>
                    <button class="btn-verde" id="btnEditarTransferencia">Editar Transferência</button>
                    <button class="btn-vermelho" id="btnCancelarEscolhaEdicao">Cancelar</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);

        modal.addEventListener("click", function(e){
            if(e.target === modal){
                fecharModalEscolhaEdicao();
            }
        });

        modal.querySelector("#btnCancelarEscolhaEdicao").addEventListener("click", fecharModalEscolhaEdicao);

        modal.querySelector("#btnEditarMovimentacao").addEventListener("click", function(){
            const item = itemSelecionadoEdicao;
            fecharModalEscolhaEdicao();
            if(!item) return;

            if(typeof window.abrirFormularioEditarMovimentacao === "function") return window.abrirFormularioEditarMovimentacao(item);
            if(typeof window.editarMovimentacao === "function") return window.editarMovimentacao(item);
            if(typeof window.editarItemMovimentacao === "function") return window.editarItemMovimentacao(item);
            if(typeof window.editarItem === "function") return window.editarItem(item);

            console.warn("Função de edição de movimentação não encontrada.");
        });

        modal.querySelector("#btnEditarTransferencia").addEventListener("click", function(){
            const item = itemSelecionadoEdicao;
            fecharModalEscolhaEdicao();
            if(!item) return;

            if(typeof window.abrirFormularioEditarTransferencia === "function") return window.abrirFormularioEditarTransferencia(item);
            if(typeof window.editarTransferencia === "function") return window.editarTransferencia(item);
            if(typeof window.editarItemTransferencia === "function") return window.editarItemTransferencia(item);
            if(typeof window.editarItem === "function") return window.editarItem(item);

            console.warn("Função de edição de transferência não encontrada.");
        });

        return modal;
    }

    window.abrirModalEscolhaEdicao = function(item){
        itemSelecionadoEdicao = item;
        const modal = garantirModalEscolhaEdicao();
        modal.classList.add("ativo");
    };

    window.fecharModalEscolhaEdicao = function(){
        const modal = document.getElementById("modalEscolhaEdicao");
        if(modal) modal.classList.remove("ativo");
        itemSelecionadoEdicao = null;
    };

    document.addEventListener("click", function(e){
        const alvo = e.target.closest('[onclick*="editarItem("], [onclick*="editarMovimentacao("], [onclick*="editarTransferencia("]');
        if(!alvo) return;

        const secaoEstoque = alvo.closest("#estoque, .modulo-estoque, [data-modulo='estoque'], .aba-estoque, .secao-estoque");
        if(!secaoEstoque && !document.body.innerText.includes("Últimas Movimentações")) return;

        const onclickTxt = alvo.getAttribute("onclick") || "";
        if(onclickTxt.includes("abrirModalEscolhaEdicao(")) return;

        e.preventDefault();
        e.stopPropagation();

        let item = null;
        if(window.itemEmEdicaoAtual) item = window.itemEmEdicaoAtual;
        window.abrirModalEscolhaEdicao(item);
    }, true);

    document.addEventListener("DOMContentLoaded", function(){
        document.querySelectorAll('[onclick*="editarItem("], [onclick*="editarMovimentacao("], [onclick*="editarTransferencia("]').forEach(function(el){
            const txt = el.getAttribute("onclick") || "";
            if(
                txt.includes("abrirModalEscolhaEdicao(") ||
                txt.includes("return false")
            ) return;
        });
    });
})();
</script>
<!-- FIM MODAL ESCOLHA EDICAO DINAMICO -->
</body>
</html>
