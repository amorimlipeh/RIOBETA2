<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RIOBETA2 Dashboard</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1f3a;
      color: #fff;
    }
    .wrap {
      min-height: 100vh;
      padding: 20px;
    }
    .hero {
      background: #1a3470;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 18px;
    }
    .loader {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      vertical-align: middle;
      margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }
    .card, .panel {
      background: #142d5c;
      border-radius: 14px;
      padding: 16px;
    }
    .label {
      opacity: .85;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .value {
      font-size: 30px;
      font-weight: bold;
    }
    .logs .log {
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .logs .log:last-child { border-bottom: 0; }
    .muted { opacity: .8; }
    .hidden { display:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h2 style="margin:0 0 8px;">🚀 Dashboard RIOBETA2</h2>
      <div id="statusLine"><span class="loader"></span>Carregando dados do dashboard...</div>
    </div>

    <div id="dashboard" class="hidden">
      <div class="cards">
        <div class="card">
          <div class="label">Produtos</div>
          <div class="value" id="produtos">0</div>
        </div>
        <div class="card">
          <div class="label">Estoque total</div>
          <div class="value" id="estoqueTotal">0</div>
        </div>
        <div class="card">
          <div class="label">Pedidos abertos</div>
          <div class="value" id="pedidosAbertos">0</div>
        </div>
        <div class="card">
          <div class="label">Recebimentos</div>
          <div class="value" id="recebimentos">0</div>
        </div>
        <div class="card">
          <div class="label">Ocupação</div>
          <div class="value" id="ocupacao">0%</div>
        </div>
      </div>

      <div class="panel logs">
        <h3 style="margin-top:0;">Últimos logs</h3>
        <div id="logs"></div>
      </div>
    </div>
  </div>

  <script>
    async function carregarDashboard() {
      const statusLine = document.getElementById('statusLine');
      const dashboard = document.getElementById('dashboard');

      try {
        const response = await fetch('/api/dashboard');
        const data = await response.json();

        if (!data.ok) throw new Error('Resposta inválida');

        document.getElementById('produtos').textContent = data.produtos ?? 0;
        document.getElementById('estoqueTotal').textContent = data.estoqueTotal ?? 0;
        document.getElementById('pedidosAbertos').textContent = data.pedidosAbertos ?? 0;
        document.getElementById('recebimentos').textContent = data.recebimentos ?? 0;
        document.getElementById('ocupacao').textContent = data.ocupacao ?? '0%';

        const logs = Array.isArray(data.logs) ? data.logs : [];
        document.getElementById('logs').innerHTML = logs.length
          ? logs.map(log => `
              <div class="log">
                <strong>${log.modulo || log.msg || 'sistema'}</strong><br>
                <span class="muted">${log.acao || log.msg || JSON.stringify(log)}</span>
              </div>
            `).join('')
          : '<div class="muted">Nenhum log encontrado.</div>';

        statusLine.textContent = '✅ Dashboard carregado com sucesso';
        dashboard.classList.remove('hidden');
      } catch (error) {
        statusLine.innerHTML = '❌ Erro ao carregar dashboard';
      }
    }

    carregarDashboard();
  </script>
</body>
</html>
