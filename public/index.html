
<!DOCTYPE html>
<html>
<head>
<meta name=viewport content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;background:#0b1f3a;color:#fff;margin:0}
.box{padding:20px}
input{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none}
button{padding:12px;border:none;border-radius:8px;background:#3b5bbf;color:#fff;width:100%}
.card{background:#1a2f5c;padding:15px;border-radius:10px;margin-top:10px}
</style>
</head>
<body>

<div class=box>
<h2>Pedido</h2>

<input id=prod placeholder="Produto">
<input id=qtd placeholder="Quantidade">
<button onclick="addItem()">Adicionar item</button>
<button onclick="criar()">Criar pedido</button>

<div id=lista></div>

<hr>

<h2>Picking</h2>
<input id=pedidoId placeholder="ID Pedido">
<button onclick="carregar()">Carregar picking</button>

<div id=result></div>

</div>

<script>
let itens=[]

function renderLista(){
 lista.innerHTML=itens.map(i=>`<div>${i.nome} (${i.qtd})</div>`).join('')
}

function addItem(){
 itens.push({nome:prod.value,qtd:qtd.value})
 renderLista()
}

function criar(){
 fetch('/api/pedido',{method:'POST',headers:{'Content-Type':'application/json'},
 body:JSON.stringify({itens})}).then(()=>{
  alert('Pedido criado')
  itens=[]
  renderLista()
 })
}

async function carregar(){
 const r=await fetch('/api/picking/'+pedidoId.value).then(r=>r.json())
 if(!r.ok){
   result.innerHTML='Pedido não encontrado'
   return
 }

 result.innerHTML=r.lista.map(i=>`
 <div class=card>
 ${i.nome} (${i.qtd})<br>
 Endereço: ${i.endereco}<br>
 <input placeholder="Qtd retirar" id="q_${i.nome}">
 <button onclick="retirar('${i.nome}','${i.endereco}')">OK</button>
 </div>
 `).join('')
}

function retirar(nome,endereco){
 let qtd=document.getElementById('q_'+nome).value
 fetch('/api/retirar',{method:'POST',headers:{'Content-Type':'application/json'},
 body:JSON.stringify({nome,endereco,qtd})}).then(()=>carregar())
}
</script>

</body>
</html>
