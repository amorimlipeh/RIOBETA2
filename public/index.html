<!-- INICIO INTERCEPT EDITAR ESTOQUE -->
<script>
(function(){
    let itemEdicaoAtual = null;

    function normalizarTexto(v){
        return String(v || "").replace(/\s+/g, " ").trim();
    }

    function dispararEventos(el){
        if(!el) return;
        el.dispatchEvent(new Event("input", { bubbles:true }));
        el.dispatchEvent(new Event("change", { bubbles:true }));
        el.dispatchEvent(new Event("blur", { bubbles:true }));
    }

    function setValor(el, valor){
        if(!el) return;
        el.value = valor ?? "";
        dispararEventos(el);
    }

    function encontrarSecaoPorTitulo(titulo){
        const alvos = [...document.querySelectorAll("h1,h2,h3,h4,h5,h6,strong,label,div")];
        const node = alvos.find(el => normalizarTexto(el.textContent).toLowerCase() === titulo.toLowerCase());
        if(!node) return null;
        return node.closest(".card, .bloco, .box, section, .modulo-card, .painel, div") || node.parentElement;
    }

    function pegarInputsDaSecao(secao){
        if(!secao) return [];
        return [...secao.querySelectorAll("input, select, textarea")];
    }

    function preencherPorPlaceholder(inputs, termos, valor){
        const alvo = inputs.find(el=>{
            const p = normalizarTexto(el.placeholder).toLowerCase();
            const n = normalizarTexto(el.name).toLowerCase();
            const i = normalizarTexto(el.id).toLowerCase();
            return termos.some(t => p.includes(t) || n.includes(t) || i.includes(t));
        });
        if(alvo) setValor(alvo, valor);
        return alvo;
    }

    function linhasDeTabela(secao){
        if(!secao) return [];
        return [...secao.querySelectorAll("tr")].filter(tr => {
            const tds = tr.querySelectorAll("td,th");
            return tds.length > 0;
        });
    }

    function extrairTextoLinha(tr){
        return [...tr.querySelectorAll("td,th,span,div")].map(x => normalizarTexto(x.textContent)).filter(Boolean);
    }

    function pareceCodigo(txt){
        return /^[a-z]{2,}\d+[a-z0-9]*$/i.test(txt || "");
    }

    function pareceEndereco(txt){
        return /(^\d{6,8}$)|(^\d{2}[-/]\d{3}[-/]\d[-/]\d$)/.test(txt || "");
    }

    function pareceNumero(txt){
        return /^\d+[.,]?\d*$/.test((txt || "").replace(/\s/g,''));
    }

    function buscarFallbackProdutoEnderecoQtd(){
        const out = { codigo:"", produto:"", endereco:"", qtd:"" };

        const secaoSaldo = encontrarSecaoPorTitulo("Saldo Consolidado por Produto");
        const secaoEndereco = encontrarSecaoPorTitulo("Estoque por Endereço") || encontrarSecaoPorTitulo("Estoque por Endereco");

        if(secaoSaldo){
            const trs = linhasDeTabela(secaoSaldo);
            for(const tr of trs){
                const vals = extrairTextoLinha(tr);
                const codigo = vals.find(v => pareceCodigo(v));
                const produto = vals.find(v => /[a-zà-ú]/i.test(v) && !pareceCodigo(v) && !pareceNumero(v) && !pareceEndereco(v));
                if(codigo && produto){
                    out.codigo = codigo;
                    out.produto = produto;
                    break;
                }
            }
        }

        if(secaoEndereco){
            const trs = linhasDeTabela(secaoEndereco);
            for(const tr of trs){
                const vals = extrairTextoLinha(tr);
                const endereco = vals.find(v => pareceEndereco(v));
                const qtd = vals.find(v => pareceNumero(v) && !pareceEndereco(v));
                const produto = vals.find(v => /[a-zà-ú]/i.test(v) && !pareceCodigo(v) && !pareceNumero(v) && !pareceEndereco(v));
                if(produto && !out.produto) out.produto = produto;
                if(endereco && !out.endereco) out.endereco = endereco;
                if(qtd && !out.qtd) out.qtd = qtd;
                if(out.endereco && out.qtd) break;
            }
        }

        return out;
    }

    function extrairDadosDaLinha(botao){
        const linha = botao.closest("tr") || botao.closest(".linha") || botao.closest(".card") || botao.parentElement;
        const celulas = linha ? [...linha.querySelectorAll("td,th,span,div")].map(x => normalizarTexto(x.textContent)).filter(Boolean) : [];

        const dados = {
            bruto: celulas,
            produto: "",
            codigo: "",
            tipo: "",
            endereco: "",
            origem: "",
            destino: "",
            qtd: "",
            datahora: ""
        };

        for(const c of celulas){
            const low = c.toLowerCase();

            if(!dados.tipo && ["entrada","saida","saída","transferencia","transferência","ajuste"].includes(low)){
                dados.tipo = c;
                continue;
            }

            if(!dados.endereco && pareceEndereco(c)){
                dados.endereco = c;
                continue;
            }

            if(!dados.codigo && pareceCodigo(c)){
                dados.codigo = c;
                continue;
            }

            if(!dados.qtd && pareceNumero(c) && !pareceEndereco(c) && c.length <= 8){
                dados.qtd = c;
                continue;
            }

            if(!dados.produto && /[a-zà-ú]/i.test(c) && !/editar|cancelar|ativo|status|ação|acao|entrada|sa[ií]da|transfer/i.test(low) && !pareceCodigo(c)){
                dados.produto = c;
            }
        }

        const fallback = buscarFallbackProdutoEnderecoQtd();

        if(!dados.codigo) dados.codigo = fallback.codigo || "";
        if(!dados.produto) dados.produto = fallback.produto || "";
        if(!dados.endereco) dados.endereco = fallback.endereco || "";
        if(!dados.qtd) dados.qtd = fallback.qtd || "";

        if(!dados.origem) dados.origem = dados.endereco || "";
        if(!dados.destino) dados.destino = "";

        return dados;
    }

    function garantirModalEscolha(){
        let modal = document.getElementById("modalEscolhaTipoEdicao");
        if(modal) return modal;

        modal = document.createElement("div");
        modal.id = "modalEscolhaTipoEdicao";
        modal.style.cssText = `
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.75);
            display:flex;
            align-items:center;
            justify-content:center;
            z-index:999999;
            padding:16px;
        `;

        modal.innerHTML = `
            <div style="
                background:linear-gradient(180deg,#1e293b 0%, #162033 100%);
                padding:24px;
                border-radius:16px;
                width:min(92vw, 400px);
                text-align:center;
                box-shadow:0 20px 55px rgba(0,0,0,.45);
                border:1px solid rgba(255,255,255,.06);
            ">
                <h2 style="color:#fff;margin:0 0 10px 0;font-size:24px;">Selecionar Tipo de Edição</h2>
                <p style="color:#d7deea;margin:0 0 18px 0;">O que deseja editar?</p>

                <button id="btnEscolhaMov" type="button" style="
                    width:100%;
                    margin-bottom:10px;
                    padding:14px;
                    border:none;
                    border-radius:12px;
                    background:linear-gradient(90deg,#2f80ed,#2563eb);
                    color:#fff;
                    font-weight:700;
                    font-size:16px;
                ">Editar Movimentação</button>

                <button id="btnEscolhaTransf" type="button" style="
                    width:100%;
                    margin-bottom:10px;
                    padding:14px;
                    border:none;
                    border-radius:12px;
                    background:linear-gradient(90deg,#22c55e,#16a34a);
                    color:#fff;
                    font-weight:700;
                    font-size:16px;
                ">Editar Transferência</button>

                <button id="btnFecharEscolha" type="button" style="
                    width:100%;
                    padding:14px;
                    border:none;
                    border-radius:12px;
                    background:linear-gradient(90deg,#ef4444,#dc2626);
                    color:#fff;
                    font-weight:700;
                    font-size:16px;
                ">Cancelar</button>
            </div>
        `;

        document.body.appendChild(modal);

        modal.addEventListener("click", function(e){
            if(e.target === modal) adicionarPedidoNaLista();
            modal.remove();
        });

        modal.querySelector("#btnFecharEscolha").onclick = ()=> adicionarPedidoNaLista();
            modal.remove();
        modal.querySelector("#btnEscolhaMov").onclick = ()=> { adicionarPedidoNaLista();
            modal.remove(); preencherFormularioMovimentacao(); };
        modal.querySelector("#btnEscolhaTransf").onclick = ()=> { adicionarPedidoNaLista();
            modal.remove(); preencherFormularioTransferencia(); };

        return modal;
    }

    function preencherFormularioMovimentacao(){
        const secao = encontrarSecaoPorTitulo("Nova Movimentação") || encontrarSecaoPorTitulo("Editar Movimentação");
        if(!secao){
            alert("Formulário de movimentação não encontrado.");
            return;
        }

        const dados = itemEdicaoAtual || {};
        const inputs = pegarInputsDaSecao(secao);

        const inputProduto = preencherPorPlaceholder(inputs, ["código", "codigo", "produto", "nome"], dados.codigo || dados.produto || "");
        const inputEndereco = preencherPorPlaceholder(inputs, ["endereço wms", "endereco wms", "endereço", "endereco"], dados.endereco || "");
        const inputQtd = preencherPorPlaceholder(inputs, ["quantidade", "qtd"], dados.qtd || "");

        const selectTipo = inputs.find(el => el.tagName === "SELECT");
        if(selectTipo && dados.tipo){
            const tipo = dados.tipo.toLowerCase().replace("saída","saida").replace("transferência","transferencia");
            const op = [...selectTipo.options].find(o =>
                o.value.toLowerCase().includes(tipo) || o.textContent.toLowerCase().includes(tipo)
            );
            if(op){
                selectTipo.value = op.value;
                dispararEventos(selectTipo);
            }
        }

        secao.scrollIntoView({ behavior:"smooth", block:"center" });
    }

    function preencherFormularioTransferencia(){
        const secao = encontrarSecaoPorTitulo("Transferência entre Endereços") || encontrarSecaoPorTitulo("Transferencia entre Enderecos");
        if(!secao){
            alert("Formulário de transferência não encontrado.");
            return;
        }

        const dados = itemEdicaoAtual || {};
        const inputs = pegarInputsDaSecao(secao);

        preencherPorPlaceholder(inputs, ["código", "codigo", "produto", "nome"], dados.codigo || dados.produto || "");
        preencherPorPlaceholder(inputs, ["origem"], dados.origem || dados.endereco || "");
        preencherPorPlaceholder(inputs, ["destino"], dados.destino || "");
        preencherPorPlaceholder(inputs, ["quantidade", "qtd"], dados.qtd || "");

        const btn = [...secao.querySelectorAll("button")].find(b => /transferir|salvar edição de transferência/i.test(normalizarTexto(b.textContent)));
        if(btn){
            btn.textContent = "Salvar Edição de Transferência";
            btn.dataset.modoEdicaoTransferencia = "1";
        }

        secao.scrollIntoView({ behavior:"smooth", block:"center" });
    }

    document.addEventListener("click", function(e){
        const botao = e.target.closest("button");
        if(!botao) return;
        if(normalizarTexto(botao.textContent).toLowerCase() !== "editar") return;

        e.preventDefault();
        e.stopImmediatePropagation();

        itemEdicaoAtual = extrairDadosDaLinha(botao);
        garantirModalEscolha();
    }, true);

})();

<script>
(function(){

function criarPedidosLayout(){

    if(document.getElementById("pedidosV2Base")) return;

    let titulo=null;

    document.querySelectorAll("*").forEach(el=>{
        if(
            el.innerText &&
            el.innerText.trim() === "Módulo Pedidos"
        ){
            titulo=el;
        }
    });

    if(!titulo) return;

    const bloco=document.createElement("div");

    bloco.id="pedidosV2Base";

bloco.innerHTML += `
<div class="pedido-box">
    <h2>Novo Pedido</h2>

    <input type="text" placeholder="Cliente" id="pedidoCliente">

    <input type="text" placeholder="Representante" id="pedidoRepresentante">

    <input type="date" id="pedidoData">

    <input type="text" placeholder="Nº Pedido" id="pedidoNumero">

    <button id="btnAdicionarProdutoPedido">+ Adicionar Produto</button>

    <div id="itensPedidoBox">
        <h3>Itens do Pedido</h3>
        <p>Nenhum item adicionado.</p>

<script>
(function(){
    let pedidosProdutosCache = [];
    let pedidoProdutoSelecionado = null;

    function txt(v){
        return String(v || "").trim();
    }

    function norm(v){
        return txt(v).normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
    }

    async function carregarProdutosPedido(){
        const fontes = [
            "/api/produtos",
            "/data/produtos.json"
        ];

        for(const url of fontes){
            try{
                const r = await fetch(url, { cache: "no-store" });
                if(!r.ok) continue;
                const data = await r.json();

                if(Array.isArray(data)){
                    pedidosProdutosCache = data;
                    return;
                }

                if(Array.isArray(data.produtos)){
                    pedidosProdutosCache = data.produtos;
                    return;
                }
            }catch(e){}
        }

        pedidosProdutosCache = [
            { codigo:"TST001", nome:"Caixa Organizadora Média", fator:12, imagem:"" },
            { codigo:"TST002", nome:"Plástico Bolha Premium", fator:10, imagem:"" },
            { codigo:"TST003", nome:"Etiqueta Logística", fator:20, imagem:"" },
            { codigo:"TST004", nome:"Papel Kraft Bobina", fator:15, imagem:"" },
            { codigo:"TST005", nome:"Fita Adesiva Transparente", fator:6, imagem:"" }
        ];
    }

    function getCodigo(p){
        return txt(p.codigo || p.code || p.sku || "");
    }

    function getNome(p){
        return txt(p.nome || p.name || p.descricao || "Produto");
    }

    function getFator(p){
        const f = Number(p.fator || p.fatorConversao || p.fator_conversao || p.caixa || 1);
        return isNaN(f) || f <= 0 ? 1 : f;
    }

    function getImagem(p){
        return txt(p.imagem || p.image || p.foto || "");
    }

    function criarModalAdicionarProduto(){
        if(document.getElementById("modalProdutoPedido")) return;

        const modal = document.createElement("div");
        modal.id = "modalProdutoPedido";
        modal.style.display = "none";
        modal.style.position = "fixed";
        modal.style.inset = "0";
        modal.style.background = "rgba(0,0,0,.75)";
        modal.style.zIndex = "99999";
        modal.style.alignItems = "center";
        modal.style.justifyContent = "center";
        modal.style.padding = "20px";

        modal.innerHTML = `
            <div style="
                width:100%;
                max-width:560px;
                background:#162742;
                border-radius:18px;
                padding:20px;
                box-shadow:0 0 30px rgba(0,0,0,.45);
                max-height:85vh;
                overflow:auto;
            ">
                <h3 style="color:#fff;margin:0 0 14px 0;">Adicionar Produto</h3>

                <input
                    id="pesquisaProdutoPedido"
                    type="text"
                    placeholder="Pesquisar produto..."
                    style="
                        width:100%;
                        padding:14px;
                        border:none;
                        border-radius:10px;
                        margin-bottom:14px;
                        background:#0b1730;
                        color:#fff;
                        outline:none;
                    "
                >

                <div id="listaBuscaProdutosPedido" style="display:flex;flex-direction:column;gap:8px;"></div>

                <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:14px;">
                    <button id="btnCancelarProdutoPedido" style="
                        padding:12px 18px;
                        border:none;
                        border-radius:10px;
                        background:#475569;
                        color:#fff;
                        font-weight:700;
                        cursor:pointer;
                    ">Cancelar</button>

                    <button id="btnConfirmarProdutoPedido" style="
                        padding:12px 18px;
                        border:none;
                        border-radius:10px;
                        background:#2f6df6;
                        color:#fff;
                        font-weight:700;
                        cursor:pointer;
                    ">Adicionar</button>
                </div>
            </div>
        `;

        document.body.appendChild(modal);

        modal.addEventListener("click", function(e){
            if(e.target === modal){
                fecharModalProdutoPedido();
            }
        });

        document.getElementById("btnCancelarProdutoPedido").onclick = fecharModalProdutoPedido;
        document.getElementById("btnConfirmarProdutoPedido").onclick = confirmarProdutoPedido;

        document.getElementById("pesquisaProdutoPedido").addEventListener("input", function(){
            renderListaBuscaProdutos(this.value);
        });

        document.getElementById("btnConfirmarProdutoPedido").innerText = "Próximo";
    }

    function abrirModalProdutoPedido(){
        const modal = document.getElementById("modalProdutoPedido");
        if(!modal) return;
        pedidoProdutoSelecionado = null;
        modal.style.display = "flex";
        const input = document.getElementById("pesquisaProdutoPedido");
        if(input){
            input.value = "";
            input.focus();
        }
        renderListaBuscaProdutos("");
    }

    function fecharModalProdutoPedido(){
        const modal = document.getElementById("modalProdutoPedido");
        if(modal) modal.style.display = "none";
    }

    function renderListaBuscaProdutos(busca){
        const lista = document.getElementById("listaBuscaProdutosPedido");
        if(!lista) return;

        const termo = norm(busca);
        const filtrados = pedidosProdutosCache.filter(p => {
            const c = norm(getCodigo(p));
            const n = norm(getNome(p));
            return !termo || c.includes(termo) || n.includes(termo);
        });

        if(!filtrados.length){
            lista.innerHTML = `<div style="color:#cbd5e1;padding:8px 2px;">Nenhum produto encontrado.</div>`;
            return;
        }

        
        lista.innerHTML = filtrados.map((p, i) => {
            const codigo = getCodigo(p);
            const nome = getNome(p);
            const fator = getFator(p);
            const img = getImagem(p);

            const thumb = img
                ? `<img src="${img}" style="width:52px;height:52px;object-fit:cover;border-radius:10px;">`
                : `<div style="width:52px;height:52px;border-radius:10px;background:#0b1730;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;">IMG</div>`;

            return `
                <div style="
                    background:#0b1730;
                    border-radius:12px;
                    padding:12px;
                    display:flex;
                    flex-direction:column;
                    gap:10px;
                ">

                    <div style="
                        display:grid;
                        grid-template-columns:30px 52px 1fr;
                        gap:10px;
                        align-items:center;
                    ">
                        <input type="checkbox" class="pedidoSelectProduto" data-idx="${i}" style="width:20px;height:20px;">

                        ${thumb}

                        <div>
                            <div style="color:#fff;font-weight:800;font-size:13px;">${codigo}</div>
                            <div style="color:#dbe7ff;font-size:14px;">${nome}</div>
                            <div style="color:#7fb0ff;font-size:12px;">Fator: ${fator}</div>
                        </div>
                    </div>

                    <div style="display:flex;gap:10px;">
                        <input
                            type="number"
                            min="1"
                            value="1"
                            class="pedidoQtdProduto"
                            data-idx="${i}"
                            style="
                                flex:1;
                                padding:10px;
                                border:none;
                                border-radius:8px;
                                background:#162742;
                                color:#fff;
                            "
                        >

                        <select
                            class="pedidoTipoProduto"
                            data-idx="${i}"
                            style="
                                width:90px;
                                padding:10px;
                                border:none;
                                border-radius:8px;
                                background:#162742;
                                color:#fff;
                            "
                        >
                            <option value="cx">CX</option>
                            <option value="und">UND</option>
                        </select>
                    </div>

                </div>
            `;
        }).join("");

        lista.innerHTML += `
            <button id="btnAdicionarSelecionadosPedido"
                style="
                    width:100%;
                    margin-top:15px;
                    padding:14px;
                    border:none;
                    border-radius:10px;
                    background:#2f6df6;
                    color:#fff;
                    font-weight:800;
                    cursor:pointer;
                ">
                Adicionar Selecionados
            </button>
        `;

        document.getElementById("btnAdicionarSelecionadosPedido").onclick = function(){

            const checks = document.querySelectorAll(".pedidoSelectProduto:checked");

            if(!checks.length){
                alert("Selecione ao menos um produto.");
                return;
            }

            checks.forEach(check=>{

                const idx = Number(check.dataset.idx);

                pedidoProdutoSelecionado = filtrados[idx];

                document.getElementById("pedidoQtdInput")?.remove();
                document.getElementById("pedidoTipoInput")?.remove();

                const qtd = document.querySelector('.pedidoQtdProduto[data-idx="'+idx+'"]').value;
                const tipo = document.querySelector('.pedidoTipoProduto[data-idx="'+idx+'"]').value;

                window.tempQtdPedido=qtd;
                window.tempTipoPedido=tipo;

                confirmarProdutoPedido();
            });

            fecharModalProdutoPedido();
        };

    }

    function garantirListaItensPedido(){
        const titulo = Array.from(document.querySelectorAll("*"))
            .find(el => txt(el.innerText) === "Itens do Pedido");

        if(!titulo) return null;

        const card = titulo.closest("div");
        if(!card) return null;

        let lista = document.getElementById("listaItensPedidoReal");
        if(lista) return lista;

abrirModalFinalizacaoPedido();

    function confirmarProdutoPedido(){

        const qtdDigitada = Number(window.tempQtdPedido || 1);

            <div style="

                        this.closest('.pedido-item-card-real').querySelector('.pedido-qtd').innerText=novo+' CX';
                    }
                "
                style="
                    border:none;
                    background:#2f6df6;
                    color:#fff;
                    padding:8px 12px;
                    border-radius:8px;
                    cursor:pointer;
                    font-size:12px;
                    font-weight:700;
                    min-width:84px;
                ">✏️ Editar</button>

                <button onclick="
                    this.closest('.pedido-item-card-real').remove();
                    const lista=document.getElementById('listaItensPedidoReal');
                    const footer=document.getElementById('pedidoFooterAcoes');
                    if(lista && footer && !lista.querySelector('.pedido-item-card-real')){
                        footer.style.display='none';
                    }
                "
                style="
                    border:none;
                    background:#ef4444;
                    color:#fff;
                    padding:8px 12px;
                    border-radius:8px;
                    cursor:pointer;
                    font-size:12px;
                    font-weight:700;
                    min-width:84px;
                ">🗑 Excluir</button>
            </div>
        `;

        lista.appendChild(item);

        const footer = garantirFooterPedido();
        if(footer) footer.style.display = "block";

        fecharModalProdutoPedido();
    }

    function bindBotaoAdicionarProduto(){
        const btn = Array.from(document.querySelectorAll("button"))
            .find(el => txt(el.innerText).includes("+ Adicionar Produto"));

        if(!btn || btn.dataset.pedidoBindOk === "1") return;

        btn.dataset.pedidoBindOk = "1";

        const pedidosSalvosTitulo = titulos.find(el => el.innerText?.trim() === "📋 Pedidos Salvos");
        const itensTitulo = titulos.find(el => el.innerText?.trim() === "Itens do Pedido");

        if(!novoPedidoTitulo || !pedidosSalvosTitulo || !itensTitulo) return;

        const cardNovo = novoPedidoTitulo.closest("div");
        const cardSalvos = pedidosSalvosTitulo.closest("div");
        const cardItens = itensTitulo.closest("div");

        if(!cardNovo || !cardSalvos || !cardItens) return;

        if(document.getElementById("pedidosGridTopo")) return;

        const grid = document.createElement("div");
        grid.id = "pedidosGridTopo";
        grid.style.display = "grid";
        grid.style.gridTemplateColumns = "repeat(auto-fit,minmax(320px,1fr))";
        grid.style.gap = "16px";
        grid.style.marginBottom = "18px";

        cardNovo.parentNode.insertBefore(grid, cardNovo);

        grid.appendChild(cardNovo);
        grid.appendChild(cardSalvos);

        cardNovo.style.margin = "0";
        cardSalvos.style.margin = "0";
        cardItens.style.marginTop = "0";
    }

    setTimeout(aplicar,300);
    setTimeout(aplicar,1000);
    setTimeout(aplicar,2000);
})();
</script>


<script>
(function organizarPedidosDentroDoModulo(){

    function aplicar(){

        const moduloTitulo=[...document.querySelectorAll("*")]
            .find(el=>el.innerText?.trim()==="Módulo Pedidos");

        const pedidosSalvosTitulo=[...document.querySelectorAll("*")]
            .find(el=>el.innerText?.trim()==="📋 Pedidos Salvos");

        const itensTitulo=[...document.querySelectorAll("*")]
            .find(el=>el.innerText?.trim()==="Itens do Pedido");

        if(!moduloTitulo||!pedidosSalvosTitulo||!itensTitulo)return;

        const moduloCard=moduloTitulo.closest("div");
        const pedidosCard=pedidosSalvosTitulo.closest("div");
        const itensCard=itensTitulo.closest("div");

        if(!moduloCard||!pedidosCard||!itensCard)return;

        if(pedidosCard.dataset.movido)return;

        itensCard.parentNode.insertBefore(pedidosCard,itensCard);

        pedidosCard.dataset.movido="1";

    }

    setTimeout(aplicar,300);
    setTimeout(aplicar,1000);
    setTimeout(aplicar,2000);

})();
</script>


<script>
(function(){

function reorganizarPedidos(){

    const modulo = [...document.querySelectorAll("div")]
        .find(el=>el.innerText?.trim()==="Módulo Pedidos");

    const pedidosSalvos = [...document.querySelectorAll("div")]
        .find(el=>el.innerText?.trim().includes("Pedidos Salvos"));

    const itensPedido = [...document.querySelectorAll("div")]
        .find(el=>el.innerText?.trim()==="Itens do Pedido");

    if(!modulo || !pedidosSalvos || !itensPedido) return;

    const cardModulo = modulo.parentElement;
    const cardPedidos = pedidosSalvos.parentElement;
    const cardItens = itensPedido.parentElement;

    if(!cardModulo || !cardPedidos || !cardItens) return;

    if(cardPedidos.dataset.reorganizado) return;

    cardItens.before(cardPedidos);

    cardPedidos.dataset.reorganizado = "1";

}

setTimeout(reorganizarPedidos,500);
setTimeout(reorganizarPedidos,1500);
setTimeout(reorganizarPedidos,3000);

})();
</script>
