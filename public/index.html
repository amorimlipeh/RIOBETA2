<!DOCTYPE html><html lang='pt-BR'><head><meta charset='UTF-8'/><meta name='viewport' content='width=device-width, initial-scale=1.0'/><title>RIOBETA2 V21</title><meta http-equiv='Cache-Control' content='no-cache, no-store, must-revalidate'/><meta http-equiv='Pragma' content='no-cache'/><meta http-equiv='Expires' content='0'/><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#082247;color:#fff;min-height:100vh}.wrap{max-width:560px;margin:0 auto;padding:24px}.card{background:#0e2c5d;border-radius:18px;padding:22px;box-shadow:0 8px 24px rgba(0,0,0,.18);margin-top:18px}h1,h2,p{margin:0 0 12px}input{width:100%;padding:16px;border:none;border-radius:14px;margin:8px 0;font-size:18px}button{width:100%;padding:16px;border:none;border-radius:14px;margin-top:10px;background:#4a68de;color:#fff;font-size:18px;cursor:pointer}.secondary{background:#224992}.hidden{display:none}.msg{margin-top:12px;padding:12px;border-radius:12px;background:#13366f;min-height:20px}.ok{background:#165b38}.err{background:#6e1d2b}.userbox{background:#12305f;border-radius:16px;padding:18px;margin-top:16px}.topnote{font-size:13px;opacity:.85;margin-bottom:14px}</style></head><body><div class='wrap'><div class='card' id='loginCard'><h1>Login</h1><p class='topnote'>Usuário padrão: admin / 123</p><input id='loginInput' placeholder='Login' value='admin'/><input id='senhaInput' placeholder='Senha' value='123'/><button onclick='fazerLogin()'>Entrar</button><button class='secondary' onclick='mostrarCadastro()'>Criar conta</button><div class='msg' id='loginMsg'></div></div><div class='card hidden' id='cadastroCard'><h2>Criar conta</h2><input id='cadLogin' placeholder='Novo login'/><input id='cadSenha' placeholder='Nova senha'/><button onclick='criarConta()'>Salvar cadastro</button><button class='secondary' onclick='mostrarLogin()'>Voltar</button><div class='msg' id='cadMsg'></div></div><div class='card hidden' id='painelCard'><h2>RIOBETA2 ONLINE</h2><p>Login realizado com sucesso.</p><div class='userbox' id='userBox'></div><button onclick='logout()'>Sair</button></div></div><script>const VERSION_KEY='riobeta2_v21_cache_bust'; if(localStorage.getItem(VERSION_KEY)!=='done'){localStorage.setItem(VERSION_KEY,'done'); setTimeout(()=>location.reload(),50);} function msg(id,text,kind=''){const el=document.getElementById(id); el.textContent=text||''; el.className='msg'+(kind?' '+kind:'');} function mostrarCadastro(){loginCard.classList.add('hidden'); cadastroCard.classList.remove('hidden'); msg('cadMsg','');} function mostrarLogin(){cadastroCard.classList.add('hidden'); painelCard.classList.add('hidden'); loginCard.classList.remove('hidden'); msg('loginMsg','');} async function criarConta(){const login=cadLogin.value.trim(); const senha=cadSenha.value.trim(); const r=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},cache:'no-store',body:JSON.stringify({login,senha})}); const d=await r.json(); if(!d.ok) return msg('cadMsg',d.msg||'Erro ao cadastrar','err'); msg('cadMsg','Conta criada. Entrando...','ok'); loginInput.value=login; senhaInput.value=senha; setTimeout(()=>{mostrarLogin(); fazerLogin();},500);} async function fazerLogin(){const login=loginInput.value.trim(); const senha=senhaInput.value.trim(); const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},cache:'no-store',body:JSON.stringify({login,senha})}); const d=await r.json(); if(!d.ok) return msg('loginMsg',d.msg||'Erro login','err'); loginCard.classList.add('hidden'); cadastroCard.classList.add('hidden'); painelCard.classList.remove('hidden'); userBox.innerHTML=`<strong>Usuário:</strong> ${d.usuario.login}<br><strong>Cargo:</strong> ${d.usuario.cargo}<br><strong>Status:</strong> Online`; } function logout(){painelCard.classList.add('hidden'); loginCard.classList.remove('hidden'); msg('loginMsg','');}</script></body></html>
