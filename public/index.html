<!DOCTYPE html>

<body>

<!-- INICIO INTERCEPT EDITAR ESTOQUE -->
<script>
(function(){
    let itemEdicaoAtual = null;

    function normalizarTexto(v){
        return String(v || "").replace(/\s+/g, " ").trim();
    }

    function dispararEventos(el){
        if(!el) return;
        el.dispatchEvent(new Event("input", { bubbles:true }));
        el.dispatchEvent(new Event("change", { bubbles:true }));
        el.dispatchEvent(new Event("blur", { bubbles:true }));
    }

    function setValor(el, valor){
        if(!el) return;
        el.value = valor ?? "";
        dispararEventos(el);
    }

    function encontrarSecaoPorTitulo(titulo){
        const alvos = [...document.querySelectorAll("h1,h2,h3,h4,h5,h6,strong,label,div")];
        const node = alvos.find(el => normalizarTexto(el.textContent).toLowerCase() === titulo.toLowerCase());
        if(!node) return null;
        return node.closest(".card, .bloco, .box, section, .modulo-card, .painel, div") || node.parentElement;
    }

    function pegarInputsDaSecao(secao){
        if(!secao) return [];
        return [...secao.querySelectorAll("input, select, textarea")];
    }

    function preencherPorPlaceholder(inputs, termos, valor){
        const alvo = inputs.find(el=>{
            const p = normalizarTexto(el.placeholder).toLowerCase();
            const n = normalizarTexto(el.name).toLowerCase();
            const i = normalizarTexto(el.id).toLowerCase();
            return termos.some(t => p.includes(t) || n.includes(t) || i.includes(t));
        });
        if(alvo) setValor(alvo, valor);
        return alvo;
    }

    function extrairDadosDaLinha(botao){
        const linha = botao.closest("tr") || botao.closest(".linha") || botao.closest(".card") || botao.parentElement;
        if(!linha) return {};

        const secao = botao.closest(".card, .bloco, .box, section, .modulo-card, .painel") || document.body;
        const titulos = [...secao.querySelectorAll("h1,h2,h3,h4,h5,h6")].map(x => normalizarTexto(x.textContent).toLowerCase());

        const celulas = [...linha.querySelectorAll("td,th,span,div")].map(x => normalizarTexto(x.textContent)).filter(Boolean);

        const dados = {
            bruto: celulas,
            produto: "",
            codigo: "",
            tipo: "",
            endereco: "",
            origem: "",
            destino: "",
            qtd: "",
            datahora: ""
        };

        for(const c of celulas){
            const low = c.toLowerCase();

            if(!dados.tipo && ["entrada","saida","saída","transferencia","transferência","ajuste"].includes(low)){
                dados.tipo = c;
            }

            if(!dados.qtd && /^\d+[.,]?\d*$/.test(c)){
                dados.qtd = c;
            }

            if(!dados.endereco && /(\d{6,8}|(\d{2}[-/]\d{3}[-/]\d[-/]\d))/.test(c)){
                dados.endereco = c;
            }

            if(!dados.codigo && /^[a-z]{2,}\d+[a-z0-9]*$/i.test(c)){
                dados.codigo = c;
            }

            if(!dados.produto && /[a-zà-ú]/i.test(c) && c.length > 3 && !dados.tipo){
                if(!/editar|cancelar|ativo|inativo|status|a[çc][aã]o/i.test(low)){
                    dados.produto = c;
                }
            }
        }

        if(!dados.produto){
            const txt = normalizarTexto(linha.textContent);
            const partes = txt.split(/\s{2,}| \| | - /).map(s=>s.trim()).filter(Boolean);
            const cand = partes.find(p => /[a-zà-ú]/i.test(p) && !/editar|cancelar|ativo|entrada|sa[ií]da|transfer/i.test(p.toLowerCase()));
            if(cand) dados.produto = cand;
        }

        if(dados.tipo && /transfer/i.test(dados.tipo) && !dados.origem && !dados.destino){
            const enderecos = celulas.filter(c => /(\d{6,8}|(\d{2}[-/]\d{3}[-/]\d[-/]\d))/.test(c));
            if(enderecos[0]) dados.origem = enderecos[0];
            if(enderecos[1]) dados.destino = enderecos[1];
        }

        if(!dados.origem && dados.endereco) dados.origem = dados.endereco;

        return dados;
    }

    function garantirModalEscolha(){
        let modal = document.getElementById("modalEscolhaTipoEdicao");
        if(modal) return modal;

        modal = document.createElement("div");
        modal.id = "modalEscolhaTipoEdicao";
        modal.style.cssText = `
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.75);
            display:flex;
            align-items:center;
            justify-content:center;
            z-index:999999;
            padding:16px;
        `;

        modal.innerHTML = `
            <div style="
                background:linear-gradient(180deg,#1e293b 0%, #162033 100%);
                padding:24px;
                border-radius:16px;
                width:min(92vw, 400px);
                text-align:center;
                box-shadow:0 20px 55px rgba(0,0,0,.45);
                border:1px solid rgba(255,255,255,.06);
            ">
                <h2 style="color:#fff;margin:0 0 10px 0;font-size:24px;">Selecionar Tipo de Edição</h2>
                <p style="color:#d7deea;margin:0 0 18px 0;">O que deseja editar?</p>

                <button id="btnEscolhaMov" type="button" style="
                    width:100%;
                    margin-bottom:10px;
                    padding:14px;
                    border:none;
                    border-radius:12px;
                    background:linear-gradient(90deg,#2f80ed,#2563eb);
                    color:#fff;
                    font-weight:700;
                    font-size:16px;
                ">Editar Movimentação</button>

                <button id="btnEscolhaTransf" type="button" style="
                    width:100%;
                    margin-bottom:10px;
                    padding:14px;
                    border:none;
                    border-radius:12px;
                    background:linear-gradient(90deg,#22c55e,#16a34a);
                    color:#fff;
                    font-weight:700;
                    font-size:16px;
                ">Editar Transferência</button>

                <button id="btnFecharEscolha" type="button" style="
                    width:100%;
                    padding:14px;
                    border:none;
                    border-radius:12px;
                    background:linear-gradient(90deg,#ef4444,#dc2626);
                    color:#fff;
                    font-weight:700;
                    font-size:16px;
                ">Cancelar</button>
            </div>
        `;

        document.body.appendChild(modal);

        modal.addEventListener("click", function(e){
            if(e.target === modal) modal.remove();
        });

        modal.querySelector("#btnFecharEscolha").onclick = ()=> modal.remove();

        modal.querySelector("#btnEscolhaMov").onclick = function(){
            modal.remove();
            preencherFormularioMovimentacao();
        };

        modal.querySelector("#btnEscolhaTransf").onclick = function(){
            modal.remove();
            preencherFormularioTransferencia();
        };

        return modal;
    }

    function preencherFormularioMovimentacao(){
        const secao = encontrarSecaoPorTitulo("Editar Movimentação") || encontrarSecaoPorTitulo("Nova Movimentação");
        if(!secao){
            alert("Formulário de movimentação não encontrado.");
            return;
        }

        const dados = itemEdicaoAtual || {};
        const inputs = pegarInputsDaSecao(secao);

        let selectTipo = inputs.find(el => el.tagName === "SELECT");
        let inputProduto = preencherPorPlaceholder(inputs, ["código", "codigo", "produto", "nome"], dados.codigo || dados.produto);
        let inputEndereco = preencherPorPlaceholder(inputs, ["endereço wms", "endereco wms", "endereço", "endereco"], dados.endereco || dados.origem || "");
        let inputQtd = preencherPorPlaceholder(inputs, ["quantidade", "qtd"], dados.qtd || "");

        if(selectTipo && dados.tipo){
            const tipo = dados.tipo.toLowerCase()
                .replace("saída","saida")
                .replace("transferência","transferencia");
            const op = [...selectTipo.options].find(o =>
                o.value.toLowerCase().includes(tipo) || o.textContent.toLowerCase().includes(tipo)
            );
            if(op){
                selectTipo.value = op.value;
                dispararEventos(selectTipo);
            }
        }

        secao.scrollIntoView({ behavior:"smooth", block:"center" });

        // se existir função antiga, chama depois do preenchimento
        if(typeof window.editarMovimentacao === "function"){
            try { window.editarMovimentacao(itemEdicaoAtual); } catch(e) {}
        } else if(typeof window.editarItem === "function"){
            try { window.editarItem(itemEdicaoAtual); } catch(e) {}
        }
    }

    function preencherFormularioTransferencia(){
        const secao = encontrarSecaoPorTitulo("Transferência entre Endereços") || encontrarSecaoPorTitulo("Transferencia entre Enderecos");
        if(!secao){
            alert("Formulário de transferência não encontrado.");
            return;
        }

        const dados = itemEdicaoAtual || {};
        const inputs = pegarInputsDaSecao(secao);

        preencherPorPlaceholder(inputs, ["código", "codigo", "produto", "nome"], dados.codigo || dados.produto || "");
        preencherPorPlaceholder(inputs, ["origem"], dados.origem || dados.endereco || "");
        preencherPorPlaceholder(inputs, ["destino"], dados.destino || "");
        preencherPorPlaceholder(inputs, ["quantidade", "qtd"], dados.qtd || "");

        secao.scrollIntoView({ behavior:"smooth", block:"center" });

        // muda visual do botão para edição, sem depender de função inexistente
        const btn = [...secao.querySelectorAll("button")].find(b => /transferir/i.test(normalizarTexto(b.textContent)));
        if(btn){
            btn.textContent = "Salvar Edição de Transferência";
            btn.dataset.modoEdicaoTransferencia = "1";
        }
    }

    document.addEventListener("click", function(e){
        const botao = e.target.closest("button");
        if(!botao) return;
        if(normalizarTexto(botao.textContent).toLowerCase() !== "editar") return;

        const cardUltimas = [...document.querySelectorAll("h1,h2,h3,h4,h5,h6")].find(h =>
            normalizarTexto(h.textContent).toLowerCase() === "últimas movimentações" ||
            normalizarTexto(h.textContent).toLowerCase() === "ultimas movimentações" ||
            normalizarTexto(h.textContent).toLowerCase() === "ultimas movimentacoes"
        );

        const dentroHistorico = cardUltimas ? !!botao.closest(".card, .bloco, .box, section, .modulo-card, .painel") : true;
        if(!dentroHistorico) return;

        e.preventDefault();
        e.stopImmediatePropagation();

        itemEdicaoAtual = extrairDadosDaLinha(botao);
        garantirModalEscolha();
    }, true);

})();
</script>
<!-- FIM INTERCEPT EDITAR ESTOQUE -->

</body>
</html>
