<!-- INICIO INTERCEPT EDITAR ESTOQUE -->
<script>
(function(){
    let itemEdicaoAtual = null;

    function normalizarTexto(v){
        return String(v || "").replace(/\s+/g, " ").trim();
    }

    function dispararEventos(el){
        if(!el) return;
        el.dispatchEvent(new Event("input", { bubbles:true }));
        el.dispatchEvent(new Event("change", { bubbles:true }));
        el.dispatchEvent(new Event("blur", { bubbles:true }));
    }

    function setValor(el, valor){
        if(!el) return;
        el.value = valor ?? "";
        dispararEventos(el);
    }

    function encontrarSecaoPorTitulo(titulo){
        const alvos = [...document.querySelectorAll("h1,h2,h3,h4,h5,h6,strong,label,div")];
        const node = alvos.find(el => normalizarTexto(el.textContent).toLowerCase() === titulo.toLowerCase());
        if(!node) return null;
        return node.closest(".card, .bloco, .box, section, .modulo-card, .painel, div") || node.parentElement;
    }

    function pegarInputsDaSecao(secao){
        if(!secao) return [];
        return [...secao.querySelectorAll("input, select, textarea")];
    }

    function preencherPorPlaceholder(inputs, termos, valor){
        const alvo = inputs.find(el=>{
            const p = normalizarTexto(el.placeholder).toLowerCase();
            const n = normalizarTexto(el.name).toLowerCase();
            const i = normalizarTexto(el.id).toLowerCase();
            return termos.some(t => p.includes(t) || n.includes(t) || i.includes(t));
        });
        if(alvo) setValor(alvo, valor);
        return alvo;
    }

    function linhasDeTabela(secao){
        if(!secao) return [];
        return [...secao.querySelectorAll("tr")].filter(tr => {
            const tds = tr.querySelectorAll("td,th");
            return tds.length > 0;
        });
    }

    function extrairTextoLinha(tr){
        return [...tr.querySelectorAll("td,th,span,div")].map(x => normalizarTexto(x.textContent)).filter(Boolean);
    }

    function pareceCodigo(txt){
        return /^[a-z]{2,}\d+[a-z0-9]*$/i.test(txt || "");
    }

    function pareceEndereco(txt){
        return /(^\d{6,8}$)|(^\d{2}[-/]\d{3}[-/]\d[-/]\d$)/.test(txt || "");
    }

    function pareceNumero(txt){
        return /^\d+[.,]?\d*$/.test((txt || "").replace(/\s/g,''));
    }

    function buscarFallbackProdutoEnderecoQtd(){
        const out = { codigo:"", produto:"", endereco:"", qtd:"" };

        const secaoSaldo = encontrarSecaoPorTitulo("Saldo Consolidado por Produto");
        const secaoEndereco = encontrarSecaoPorTitulo("Estoque por Endereço") || encontrarSecaoPorTitulo("Estoque por Endereco");

        if(secaoSaldo){
            const trs = linhasDeTabela(secaoSaldo);
            for(const tr of trs){
                const vals = extrairTextoLinha(tr);
                const codigo = vals.find(v => pareceCodigo(v));
                const produto = vals.find(v => /[a-zà-ú]/i.test(v) && !pareceCodigo(v) && !pareceNumero(v) && !pareceEndereco(v));
                if(codigo && produto){
                    out.codigo = codigo;
                    out.produto = produto;
                    break;
                }
            }
        }

        if(secaoEndereco){
            const trs = linhasDeTabela(secaoEndereco);
            for(const tr of trs){
                const vals = extrairTextoLinha(tr);
                const endereco = vals.find(v => pareceEndereco(v));
                const qtd = vals.find(v => pareceNumero(v) && !pareceEndereco(v));
                const produto = vals.find(v => /[a-zà-ú]/i.test(v) && !pareceCodigo(v) && !pareceNumero(v) && !pareceEndereco(v));
                if(produto && !out.produto) out.produto = produto;
                if(endereco && !out.endereco) out.endereco = endereco;
                if(qtd && !out.qtd) out.qtd = qtd;
                if(out.endereco && out.qtd) break;
            }
        }

        return out;
    }

    function extrairDadosDaLinha(botao){
        const linha = botao.closest("tr") || botao.closest(".linha") || botao.closest(".card") || botao.parentElement;
        const celulas = linha ? [...linha.querySelectorAll("td,th,span,div")].map(x => normalizarTexto(x.textContent)).filter(Boolean) : [];

        const dados = {
            bruto: celulas,
            produto: "",
            codigo: "",
            tipo: "",
            endereco: "",
            origem: "",
            destino: "",
            qtd: "",
            datahora: ""
        };

        for(const c of celulas){
            const low = c.toLowerCase();

            if(!dados.tipo && ["entrada","saida","saída","transferencia","transferência","ajuste"].includes(low)){
                dados.tipo = c;
                continue;
            }

            if(!dados.endereco && pareceEndereco(c)){
                dados.endereco = c;
                continue;
            }

            if(!dados.codigo && pareceCodigo(c)){
                dados.codigo = c;
                continue;
            }

            if(!dados.qtd && pareceNumero(c) && !pareceEndereco(c) && c.length <= 8){
                dados.qtd = c;
                continue;
            }

            if(!dados.produto && /[a-zà-ú]/i.test(c) && !/editar|cancelar|ativo|status|ação|acao|entrada|sa[ií]da|transfer/i.test(low) && !pareceCodigo(c)){
                dados.produto = c;
            }
        }

        const fallback = buscarFallbackProdutoEnderecoQtd();

        if(!dados.codigo) dados.codigo = fallback.codigo || "";
        if(!dados.produto) dados.produto = fallback.produto || "";
        if(!dados.endereco) dados.endereco = fallback.endereco || "";
        if(!dados.qtd) dados.qtd = fallback.qtd || "";

        if(!dados.origem) dados.origem = dados.endereco || "";
        if(!dados.destino) dados.destino = "";

        return dados;
    }

    function garantirModalEscolha(){
        let modal = document.getElementById("modalEscolhaTipoEdicao");
        if(modal) return modal;

        modal = document.createElement("div");
        modal.id = "modalEscolhaTipoEdicao";
        modal.style.cssText = `
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.75);
            display:flex;
            align-items:center;
            justify-content:center;
            z-index:999999;
            padding:16px;
        `;

        modal.innerHTML = `
            <div style="
                background:linear-gradient(180deg,#1e293b 0%, #162033 100%);
                padding:24px;
                border-radius:16px;
                width:min(92vw, 400px);
                text-align:center;
                box-shadow:0 20px 55px rgba(0,0,0,.45);
                border:1px solid rgba(255,255,255,.06);
            ">
                <h2 style="color:#fff;margin:0 0 10px 0;font-size:24px;">Selecionar Tipo de Edição</h2>
                <p style="color:#d7deea;margin:0 0 18px 0;">O que deseja editar?</p>

                <button id="btnEscolhaMov" type="button" style="
                    width:100%;
                    margin-bottom:10px;
                    padding:14px;
                    border:none;
                    border-radius:12px;
                    background:linear-gradient(90deg,#2f80ed,#2563eb);
                    color:#fff;
                    font-weight:700;
                    font-size:16px;
                ">Editar Movimentação</button>

                <button id="btnEscolhaTransf" type="button" style="
                    width:100%;
                    margin-bottom:10px;
                    padding:14px;
                    border:none;
                    border-radius:12px;
                    background:linear-gradient(90deg,#22c55e,#16a34a);
                    color:#fff;
                    font-weight:700;
                    font-size:16px;
                ">Editar Transferência</button>

                <button id="btnFecharEscolha" type="button" style="
                    width:100%;
                    padding:14px;
                    border:none;
                    border-radius:12px;
                    background:linear-gradient(90deg,#ef4444,#dc2626);
                    color:#fff;
                    font-weight:700;
                    font-size:16px;
                ">Cancelar</button>
            </div>
        `;

        document.body.appendChild(modal);

        modal.addEventListener("click", function(e){
            if(e.target === modal) modal.remove();
        });

        modal.querySelector("#btnFecharEscolha").onclick = ()=> modal.remove();
        modal.querySelector("#btnEscolhaMov").onclick = ()=> { modal.remove(); preencherFormularioMovimentacao(); };
        modal.querySelector("#btnEscolhaTransf").onclick = ()=> { modal.remove(); preencherFormularioTransferencia(); };

        return modal;
    }

    function preencherFormularioMovimentacao(){
        const secao = encontrarSecaoPorTitulo("Nova Movimentação") || encontrarSecaoPorTitulo("Editar Movimentação");
        if(!secao){
            alert("Formulário de movimentação não encontrado.");
            return;
        }

        const dados = itemEdicaoAtual || {};
        const inputs = pegarInputsDaSecao(secao);

        const inputProduto = preencherPorPlaceholder(inputs, ["código", "codigo", "produto", "nome"], dados.codigo || dados.produto || "");
        const inputEndereco = preencherPorPlaceholder(inputs, ["endereço wms", "endereco wms", "endereço", "endereco"], dados.endereco || "");
        const inputQtd = preencherPorPlaceholder(inputs, ["quantidade", "qtd"], dados.qtd || "");

        const selectTipo = inputs.find(el => el.tagName === "SELECT");
        if(selectTipo && dados.tipo){
            const tipo = dados.tipo.toLowerCase().replace("saída","saida").replace("transferência","transferencia");
            const op = [...selectTipo.options].find(o =>
                o.value.toLowerCase().includes(tipo) || o.textContent.toLowerCase().includes(tipo)
            );
            if(op){
                selectTipo.value = op.value;
                dispararEventos(selectTipo);
            }
        }

        secao.scrollIntoView({ behavior:"smooth", block:"center" });
    }

    function preencherFormularioTransferencia(){
        const secao = encontrarSecaoPorTitulo("Transferência entre Endereços") || encontrarSecaoPorTitulo("Transferencia entre Enderecos");
        if(!secao){
            alert("Formulário de transferência não encontrado.");
            return;
        }

        const dados = itemEdicaoAtual || {};
        const inputs = pegarInputsDaSecao(secao);

        preencherPorPlaceholder(inputs, ["código", "codigo", "produto", "nome"], dados.codigo || dados.produto || "");
        preencherPorPlaceholder(inputs, ["origem"], dados.origem || dados.endereco || "");
        preencherPorPlaceholder(inputs, ["destino"], dados.destino || "");
        preencherPorPlaceholder(inputs, ["quantidade", "qtd"], dados.qtd || "");

        const btn = [...secao.querySelectorAll("button")].find(b => /transferir|salvar edição de transferência/i.test(normalizarTexto(b.textContent)));
        if(btn){
            btn.textContent = "Salvar Edição de Transferência";
            btn.dataset.modoEdicaoTransferencia = "1";
        }

        secao.scrollIntoView({ behavior:"smooth", block:"center" });
    }

    document.addEventListener("click", function(e){
        const botao = e.target.closest("button");
        if(!botao) return;
        if(normalizarTexto(botao.textContent).toLowerCase() !== "editar") return;

        e.preventDefault();
        e.stopImmediatePropagation();

        itemEdicaoAtual = extrairDadosDaLinha(botao);
        garantirModalEscolha();
    }, true);

})();
</script>
<!-- FIM INTERCEPT EDITAR ESTOQUE -->















<!-- INICIO PEDIDOS V2 BASE -->
<script>
(function(){
    function txt(v){
        return String(v || "").trim();
    }

    function normalize(v){
        return txt(v).normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
    }

    function findPedidosSection(){
        const heads = [...document.querySelectorAll("h1,h2,h3,h4,h5,h6,div,strong,span")];
        const hit = heads.find(el => normalize(el.textContent) === "modulo pedidos");
        if(!hit) return null;
        return hit.closest(".card, .bloco, .box, section, .modulo-card, .painel, .module-card, .widget, div") || hit.parentElement;
    }

    function showToast(msg){
        let t = document.getElementById("pedidosV2Toast");
        if(!t){
            t = document.createElement("div");
            t.id = "pedidosV2Toast";
            t.className = "pedidos-v2-toast";
            document.body.appendChild(t);
        }
        t.textContent = msg;
        t.classList.add("ativo");
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.classList.remove("ativo"), 1800);
    }

    async function fetchProdutosBase(){
        const tries = [
            "/api/produtos",
            "/api/products",
            "/data/produtos.json",
            "/server/data/produtos.json",
            "/public/data/produtos.json"
        ];
        for(const url of tries){
            try{
                const r = await fetch(url, { cache:"no-store" });
                if(!r.ok) continue;
                const json = await r.json();
                if(Array.isArray(json)) return json;
                if(Array.isArray(json.produtos)) return json.produtos;
                if(Array.isArray(json.items)) return json.items;
            }catch(e){}
        }
        return [];
    }

    function num(v){
        const n = Number(String(v ?? "").replace(",", "."));
        return isNaN(n) ? 0 : n;
    }

    function getFator(prod){
        return num(
            prod.fator ??
            prod.fatorConversao ??
            prod.fator_conversao ??
            prod.qtdCaixa ??
            prod.caixa ??
            prod.unidadesPorCaixa ??
            1
        ) || 1;
    }

    function getCodigo(prod){
        return txt(prod.codigo || prod.code || prod.sku || prod.id || "");
    }

    function getNome(prod){
        return txt(prod.nome || prod.name || prod.descricao || prod.description || "Produto");
    }

    function getImagem(prod){
        return txt(
            prod.imagem ||
            prod.image ||
            prod.foto ||
            prod.imagemUrl ||
            prod.urlImagem ||
            ""
        );
    }

    function getStatusItem(raw){
        return raw === true ? "conferido" : (raw || "pendente");
    }

    function caixasFrom(qtd, fator){
        fator = num(fator) || 1;
        qtd = num(qtd);
        return (qtd / fator).toFixed(2).replace(/\.00$/, "");
    }

    function buildPedidosV2(section){
        if(!section) return;
        if(document.getElementById("pedidosV2Base")) return;

        const host = section.parentElement || section;
        const wrap = document.createElement("div");
        wrap.id = "pedidosV2Base";
        wrap.className = "pedidos-v2-wrap";
        wrap.innerHTML = `
            <div class="pedidos-v2-card">
                <h2 class="pedidos-v2-title">Novo Pedido</h2>

                <div class="pedidos-v2-grid-4">
                    <div class="pedidos-v2-field">
                        <label class="pedidos-v2-label">Cliente</label>
                        <input id="pedidoCliente" class="pedidos-v2-input" placeholder="Nome do cliente">
                    </div>

                    <div class="pedidos-v2-field">
                        <label class="pedidos-v2-label">Representante</label>
                        <input id="pedidoRepresentante" class="pedidos-v2-input" placeholder="Nome do representante">
                    </div>

                    <div class="pedidos-v2-field">
                        <label class="pedidos-v2-label">Data</label>
                        <input id="pedidoData" type="date" class="pedidos-v2-input">
                    </div>

                    <div class="pedidos-v2-field">
                        <label class="pedidos-v2-label">Nº Pedido / Status</label>
                        <div class="pedidos-v2-grid" style="grid-template-columns:1fr 160px;">
                            <input id="pedidoNumero" class="pedidos-v2-input" placeholder="Ex: PED-001">
                            <select id="pedidoStatus" class="pedidos-v2-select">
                                <option value="pendente">Pendente</option>
                                <option value="em_montagem">Em montagem</option>
                                <option value="concluido">Concluído</option>
                                <option value="expedido">Expedido</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="pedidos-v2-btn-row" style="margin-top:14px;">
                    <button id="btnAbrirCatalogoPedido" class="pedidos-v2-btn">Adicionar Produto</button>
                    <button id="btnLimparPedido" class="pedidos-v2-btn pedidos-v2-btn-sec">Limpar Pedido</button>
                </div>
            </div>

            <div class="pedidos-v2-divider"></div>

            <div class="pedidos-v2-card">
                <h3 class="pedidos-v2-title" style="font-size:22px;">Itens do Pedido</h3>
                <div id="pedidoItensLista" class="pedidos-v2-items">
                    <div class="pedidos-v2-empty">Nenhum item adicionado ao pedido.</div>
                </div>
            </div>

            <div class="pedidos-v2-divider"></div>

            <div class="pedidos-v2-card">
                <h3 class="pedidos-v2-title" style="font-size:22px;">Resumo</h3>
                <div class="pedidos-v2-summary">
                    <div class="pedidos-v2-summary-card">
                        <div class="pedidos-v2-summary-label">Total de Itens</div>
                        <div id="resumoItens" class="pedidos-v2-summary-value">0</div>
                    </div>
                    <div class="pedidos-v2-summary-card">
                        <div class="pedidos-v2-summary-label">Total Unidades</div>
                        <div id="resumoUnidades" class="pedidos-v2-summary-value">0</div>
                    </div>
                    <div class="pedidos-v2-summary-card">
                        <div class="pedidos-v2-summary-label">Total Caixas</div>
                        <div id="resumoCaixas" class="pedidos-v2-summary-value">0</div>
                    </div>
                </div>

                <div class="pedidos-v2-btn-row" style="margin-top:16px;">
                    <button id="btnSalvarPedido" class="pedidos-v2-btn pedidos-v2-btn-green">Salvar Pedido</button>
                </div>
            </div>
        `;

        section.style.display = "none";
        host.appendChild(wrap);

        if(!document.getElementById("pedidoCatalogoModal")){
            const modal = document.createElement("div");
            modal.id = "pedidoCatalogoModal";
            modal.className = "pedidos-v2-modal";
            modal.innerHTML = `
                <div class="pedidos-v2-modal-box">
                    <div class="pedidos-v2-modal-head">
                        <div class="pedidos-v2-modal-title">Catálogo de Produtos</div>
                        <button class="pedidos-v2-close" id="btnFecharCatalogoPedido">Fechar</button>
                    </div>
                    <input id="pedidoCatalogoBusca" class="pedidos-v2-search" placeholder="Pesquisar produto por código ou nome">
                    <div id="pedidoCatalogoLista" class="pedidos-v2-catalog"></div>
                </div>
            `;
            document.body.appendChild(modal);
        }
    }

    const pedidosState = {
        produtos: [],
        itens: []
    };

    function renderResumo(){
        const totalItens = pedidosState.itens.length;
        const totalUnidades = pedidosState.itens.reduce((acc, it) => acc + num(it.quantidade), 0);
        const totalCaixas = pedidosState.itens.reduce((acc, it) => acc + (num(it.quantidade) / (num(it.fator) || 1)), 0);

        const elItens = document.getElementById("resumoItens");
        const elUn = document.getElementById("resumoUnidades");
        const elCx = document.getElementById("resumoCaixas");

        if(elItens) elItens.textContent = String(totalItens);
        if(elUn) elUn.textContent = String(totalUnidades);
        if(elCx) elCx.textContent = totalCaixas.toFixed(2).replace(/\.00$/, "");
    }

    function renderItensPedido(){
        const box = document.getElementById("pedidoItensLista");
        if(!box) return;

        if(!pedidosState.itens.length){
            box.innerHTML = '<div class="pedidos-v2-empty">Nenhum item adicionado ao pedido.</div>';
            renderResumo();
            return;
        }

        box.innerHTML = pedidosState.itens.map((item, idx) => {
            const checked = item.statusItem === "conferido";
            const img = item.imagem
                ? `<img src="${item.imagem}" alt="${item.nome}" onerror="this.parentElement.innerHTML='<div class=&quot;pedidos-v2-noimg&quot;>SEM IMG</div>';">`
                : `<div class="pedidos-v2-noimg">SEM IMG</div>`;
            return `
                <div class="pedidos-v2-item" data-item-index="${idx}">
                    <div class="pedidos-v2-thumb">${img}</div>

                    <div class="pedidos-v2-info">
                        <div class="pedidos-v2-code">${item.codigo}</div>
                        <div class="pedidos-v2-name">${item.nome}</div>
                        <div class="pedidos-v2-meta">
                            <span>Fator: ${item.fator} un/cx</span>
                            <span>Qtd: ${item.quantidade} un</span>
                            <span>Caixas: ${caixasFrom(item.quantidade, item.fator)}</span>
                            <span>Status: ${item.statusItem}</span>
                        </div>
                    </div>

                    <div class="pedidos-v2-actions">
                        <button class="pedidos-v2-check ${checked ? "ativo" : ""}" data-check-index="${idx}">✅</button>
                        <button class="pedidos-v2-remove" data-remove-index="${idx}">Remover</button>
                    </div>
                </div>
            `;
        }).join("");

        box.querySelectorAll("[data-check-index]").forEach(btn => {
            btn.onclick = function(){
                const idx = Number(this.dataset.checkIndex);
                const item = pedidosState.itens[idx];
                if(!item) return;
                item.statusItem = item.statusItem === "conferido" ? "pendente" : "conferido";
                renderItensPedido();
            };
        });

        box.querySelectorAll("[data-remove-index]").forEach(btn => {
            btn.onclick = function(){
                const idx = Number(this.dataset.removeIndex);
                pedidosState.itens.splice(idx, 1);
                renderItensPedido();
                showToast("Item removido do pedido.");
            };
        });

        renderResumo();
    }

    function renderCatalogo(lista){
        const box = document.getElementById("pedidoCatalogoLista");
        if(!box) return;

        if(!lista.length){
            box.innerHTML = `<div class="pedidos-v2-empty">Nenhum produto encontrado.</div>`;
            return;
        }

        box.innerHTML = lista.map((prod, idx) => {
            const codigo = getCodigo(prod);
            const nome = getNome(prod);
            const fator = getFator(prod);
            const imagem = getImagem(prod);
            const img = imagem
                ? `<img src="${imagem}" alt="${nome}" onerror="this.parentElement.innerHTML='<div class=&quot;pedidos-v2-noimg&quot;>SEM IMG</div>';">`
                : `<div class="pedidos-v2-noimg">SEM IMG</div>`;

            return `
                <div class="pedidos-v2-catalog-item" data-catalog-idx="${idx}">
                    <div class="pedidos-v2-catalog-thumb">${img}</div>

                    <div>
                        <div class="pedidos-v2-catalog-code">${codigo}</div>
                        <div class="pedidos-v2-catalog-name">${nome}</div>
                        <div class="pedidos-v2-catalog-meta">
                            <span>Fator: ${fator} un/cx</span>
                        </div>
                    </div>

                    <div class="pedidos-v2-catalog-actions">
                        <input type="number" min="1" step="1" value="1" class="pedidos-v2-qtd" data-qtd-idx="${idx}">
                        <button class="pedidos-v2-add" data-add-idx="${idx}">Adicionar</button>
                    </div>
                </div>
            `;
        }).join("");

        box.querySelectorAll("[data-add-idx]").forEach(btn => {
            btn.onclick = function(){
                const idx = Number(this.dataset.addIdx);
                const prod = lista[idx];
                const qtdEl = document.querySelector(`[data-qtd-idx="${idx}"]`);
                const quantidade = Math.max(1, num(qtdEl ? qtdEl.value : 1));

                pedidosState.itens.push({
                    codigo: getCodigo(prod),
                    nome: getNome(prod),
                    imagem: getImagem(prod),
                    quantidade,
                    fator: getFator(prod),
                    caixas: caixasFrom(quantidade, getFator(prod)),
                    statusItem: "pendente"
                });

                renderItensPedido();
                closeCatalogo();
                showToast("Produto adicionado ao pedido.");
            };
        });
    }

    function openCatalogo(){
        const modal = document.getElementById("pedidoCatalogoModal");
        if(modal) modal.classList.add("ativo");
        renderCatalogo(pedidosState.produtos);
        const busca = document.getElementById("pedidoCatalogoBusca");
        if(busca) busca.value = "";
    }

    function closeCatalogo(){
        const modal = document.getElementById("pedidoCatalogoModal");
        if(modal) modal.classList.remove("ativo");
    }

    function bindPedidosEvents(){
        const btnAbrir = document.getElementById("btnAbrirCatalogoPedido");
        const btnLimpar = document.getElementById("btnLimparPedido");
        const btnSalvar = document.getElementById("btnSalvarPedido");
        const btnFechar = document.getElementById("btnFecharCatalogoPedido");
        const busca = document.getElementById("pedidoCatalogoBusca");

        if(btnAbrir) btnAbrir.onclick = openCatalogo;
        if(btnLimpar) btnLimpar.onclick = function(){
            pedidosState.itens = [];
            renderItensPedido();
            showToast("Pedido limpo.");
        };
        if(btnFechar) btnFechar.onclick = closeCatalogo;

        const modal = document.getElementById("pedidoCatalogoModal");
        if(modal){
            modal.onclick = function(e){
                if(e.target === modal) closeCatalogo();
            };
        }

        if(busca){
            busca.oninput = function(){
                const q = normalize(this.value);
                const filtrados = pedidosState.produtos.filter(prod => {
                    const codigo = normalize(getCodigo(prod));
                    const nome = normalize(getNome(prod));
                    return codigo.includes(q) || nome.includes(q);
                });
                renderCatalogo(filtrados);
            };
        }

        if(btnSalvar){
            btnSalvar.onclick = async function(){
                const pedido = {
                    id: txt(document.getElementById("pedidoNumero")?.value) || ("PED-" + Date.now()),
                    cliente: txt(document.getElementById("pedidoCliente")?.value),
                    representante: txt(document.getElementById("pedidoRepresentante")?.value),
                    data: txt(document.getElementById("pedidoData")?.value),
                    status: txt(document.getElementById("pedidoStatus")?.value) || "pendente",
                    itens: pedidosState.itens
                };

                const listaLocal = JSON.parse(localStorage.getItem("pedidos_v2_local") || "[]");
                listaLocal.push(pedido);
                localStorage.setItem("pedidos_v2_local", JSON.stringify(listaLocal));

                try{
                    await fetch("/api/pedidos", {
                        method:"POST",
                        headers:{ "Content-Type":"application/json" },
                        body: JSON.stringify(pedido)
                    });
                }catch(e){}

                showToast("Pedido salvo com sucesso.");
            };
        }
    }

    function preencherBasePedido(){
        const dataEl = document.getElementById("pedidoData");
        const numeroEl = document.getElementById("pedidoNumero");
        if(dataEl && !dataEl.value){
            const d = new Date();
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, "0");
            const dd = String(d.getDate()).padStart(2, "0");
            dataEl.value = `${yyyy}-${mm}-${dd}`;
        }
        if(numeroEl && !numeroEl.value){
            numeroEl.value = "PED-" + Date.now().toString().slice(-6);
        }
    }

    async function initPedidosV2(){
        const secao = findPedidosSection();
        if(!secao) return;

        buildPedidosV2(secao);
        bindPedidosEvents();
        preencherBasePedido();
        renderItensPedido();

        pedidosState.produtos = await fetchProdutosBase();
        if(!Array.isArray(pedidosState.produtos)) pedidosState.produtos = [];
    }

    if(document.readyState === "loading"){
        document.addEventListener("DOMContentLoaded", initPedidosV2);
    }else{
        initPedidosV2();
    }

    setTimeout(initPedidosV2, 800);
    setTimeout(initPedidosV2, 1800);
})();
</script>
<!-- FIM PEDIDOS V2 BASE -->
</body>
</html>
