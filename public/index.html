<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIOBETA2 Base Completa Final</title>
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/produtos.css">
  <link rel="stylesheet" href="css/estoque.css">
  <link rel="stylesheet" href="css/wms.css">
  <link rel="stylesheet" href="css/picking.css">
  <link rel="stylesheet" href="css/pedidos.css">
  <link rel="stylesheet" href="css/importacao.css">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="css/developer.css">
  <link rel="stylesheet" href="css/notificacoes.css">
  <link rel="stylesheet" href="css/modals.css">
  <link rel="stylesheet" href="css/mobile.css">
  <link rel="stylesheet" href="css/theme.css">
</head>
<body>
  <div id="login-screen" class="screen">
    <div class="login-box">
      <h1>✨ RIO DAS ESTRELAS 💫</h1>
      <p>Base completa final</p>
      <input id="usuario" placeholder="Usuário">
      <input id="senha" type="password" placeholder="Senha">
      <button onclick="login()">Entrar</button>
      <div id="login-msg" class="msg"></div>
      <small>admin / 123</small>
    </div>
  </div>

  <div id="app-screen" class="hidden">
    <aside class="sidebar">
      <div class="side-brand">
        <div class="logo-box">✨</div>
        <div>
          <div class="side-title">SISTEMA DE ESTOQUE ✨</div>
          <div class="side-subtitle">RIO DAS ESTRELAS 🌟</div>
        </div>
      </div>
      <nav id="menu-modules"></nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="top-left">
          <strong id="module-title">Dashboard</strong>
          <span class="mode-label">Módulos sempre ativos e persistentes</span>
        </div>
        <div class="top-actions">
          <button class="pill">GitHub</button>
          <button class="pill">Railway</button>
          <button class="pill">PWA</button>
          <button class="pill danger" onclick="logout()">Sair</button>
        </div>
      </header>

      <section id="cards" class="cards"></section>
      <section id="module-view" class="panel"></section>
    </main>
  </div>

  <script src="js/state.js"></script>
  <script src="js/api.js"></script>
  <script src="js/helpers.js"></script>
  <script src="js/router.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/scanner.js"></script>
  <script src="js/camera.js"></script>
  <script src="js/importacao.js"></script>
  <script src="js/notificacoes.js"></script>
  <script src="js/mensagens.js"></script>
  <script src="js/atalhos.js"></script>
  <script src="js/permissao.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
