<!-- INICIO INTERCEPT EDITAR ESTOQUE -->
<script>
(function(){
    let itemEdicaoAtual = null;

    function normalizarTexto(v){
        return String(v || "").replace(/\s+/g, " ").trim();
    }

    function dispararEventos(el){
        if(!el) return;
        el.dispatchEvent(new Event("input", { bubbles:true }));
        el.dispatchEvent(new Event("change", { bubbles:true }));
        el.dispatchEvent(new Event("blur", { bubbles:true }));
    }

    function setValor(el, valor){
        if(!el) return;
        el.value = valor ?? "";
        dispararEventos(el);
    }

    function encontrarSecaoPorTitulo(titulo){
        const alvos = [...document.querySelectorAll("h1,h2,h3,h4,h5,h6,strong,label,div")];
        const node = alvos.find(el => normalizarTexto(el.textContent).toLowerCase() === titulo.toLowerCase());
        if(!node) return null;
        return node.closest(".card, .bloco, .box, section, .modulo-card, .painel, div") || node.parentElement;
    }

    function pegarInputsDaSecao(secao){
        if(!secao) return [];
        return [...secao.querySelectorAll("input, select, textarea")];
    }

    function preencherPorPlaceholder(inputs, termos, valor){
        const alvo = inputs.find(el=>{
            const p = normalizarTexto(el.placeholder).toLowerCase();
            const n = normalizarTexto(el.name).toLowerCase();
            const i = normalizarTexto(el.id).toLowerCase();
            return termos.some(t => p.includes(t) || n.includes(t) || i.includes(t));
        });
        if(alvo) setValor(alvo, valor);
        return alvo;
    }

    function linhasDeTabela(secao){
        if(!secao) return [];
        return [...secao.querySelectorAll("tr")].filter(tr => {
            const tds = tr.querySelectorAll("td,th");
            return tds.length > 0;
        });
    }

    function extrairTextoLinha(tr){
        return [...tr.querySelectorAll("td,th,span,div")].map(x => normalizarTexto(x.textContent)).filter(Boolean);
    }

    function pareceCodigo(txt){
        return /^[a-z]{2,}\d+[a-z0-9]*$/i.test(txt || "");
    }

    function pareceEndereco(txt){
        return /(^\d{6,8}$)|(^\d{2}[-/]\d{3}[-/]\d[-/]\d$)/.test(txt || "");
    }

    function pareceNumero(txt){
        return /^\d+[.,]?\d*$/.test((txt || "").replace(/\s/g,''));
    }

    function buscarFallbackProdutoEnderecoQtd(){
        const out = { codigo:"", produto:"", endereco:"", qtd:"" };

        const secaoSaldo = encontrarSecaoPorTitulo("Saldo Consolidado por Produto");
        const secaoEndereco = encontrarSecaoPorTitulo("Estoque por Endereço") || encontrarSecaoPorTitulo("Estoque por Endereco");

        if(secaoSaldo){
            const trs = linhasDeTabela(secaoSaldo);
            for(const tr of trs){
                const vals = extrairTextoLinha(tr);
                const codigo = vals.find(v => pareceCodigo(v));
                const produto = vals.find(v => /[a-zà-ú]/i.test(v) && !pareceCodigo(v) && !pareceNumero(v) && !pareceEndereco(v));
                if(codigo && produto){
                    out.codigo = codigo;
                    out.produto = produto;
                    break;
                }
            }
        }

        if(secaoEndereco){
            const trs = linhasDeTabela(secaoEndereco);
            for(const tr of trs){
                const vals = extrairTextoLinha(tr);
                const endereco = vals.find(v => pareceEndereco(v));
                const qtd = vals.find(v => pareceNumero(v) && !pareceEndereco(v));
                const produto = vals.find(v => /[a-zà-ú]/i.test(v) && !pareceCodigo(v) && !pareceNumero(v) && !pareceEndereco(v));
                if(produto && !out.produto) out.produto = produto;
                if(endereco && !out.endereco) out.endereco = endereco;
                if(qtd && !out.qtd) out.qtd = qtd;
                if(out.endereco && out.qtd) break;
            }
        }

        return out;
    }

    function extrairDadosDaLinha(botao){
        const linha = botao.closest("tr") || botao.closest(".linha") || botao.closest(".card") || botao.parentElement;
        const celulas = linha ? [...linha.querySelectorAll("td,th,span,div")].map(x => normalizarTexto(x.textContent)).filter(Boolean) : [];

        const dados = {
            bruto: celulas,
            produto: "",
            codigo: "",
            tipo: "",
            endereco: "",
            origem: "",
            destino: "",
            qtd: "",
            datahora: ""
        };

        for(const c of celulas){
            const low = c.toLowerCase();

            if(!dados.tipo && ["entrada","saida","saída","transferencia","transferência","ajuste"].includes(low)){
                dados.tipo = c;
                continue;
            }

            if(!dados.endereco && pareceEndereco(c)){
                dados.endereco = c;
                continue;
            }

            if(!dados.codigo && pareceCodigo(c)){
                dados.codigo = c;
                continue;
            }

            if(!dados.qtd && pareceNumero(c) && !pareceEndereco(c) && c.length <= 8){
                dados.qtd = c;
                continue;
            }

            if(!dados.produto && /[a-zà-ú]/i.test(c) && !/editar|cancelar|ativo|status|ação|acao|entrada|sa[ií]da|transfer/i.test(low) && !pareceCodigo(c)){
                dados.produto = c;
            }
        }

        const fallback = buscarFallbackProdutoEnderecoQtd();

        if(!dados.codigo) dados.codigo = fallback.codigo || "";
        if(!dados.produto) dados.produto = fallback.produto || "";
        if(!dados.endereco) dados.endereco = fallback.endereco || "";
        if(!dados.qtd) dados.qtd = fallback.qtd || "";

        if(!dados.origem) dados.origem = dados.endereco || "";
        if(!dados.destino) dados.destino = "";

        return dados;
    }

    function garantirModalEscolha(){
        let modal = document.getElementById("modalEscolhaTipoEdicao");
        if(modal) return modal;

        modal = document.createElement("div");
        modal.id = "modalEscolhaTipoEdicao";
        modal.style.cssText = `
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.75);
            display:flex;
            align-items:center;
            justify-content:center;
            z-index:999999;
            padding:16px;
        `;

        modal.innerHTML = `
            <div style="
                background:linear-gradient(180deg,#1e293b 0%, #162033 100%);
                padding:24px;
                border-radius:16px;
                width:min(92vw, 400px);
                text-align:center;
                box-shadow:0 20px 55px rgba(0,0,0,.45);
                border:1px solid rgba(255,255,255,.06);
            ">
                <h2 style="color:#fff;margin:0 0 10px 0;font-size:24px;">Selecionar Tipo de Edição</h2>
                <p style="color:#d7deea;margin:0 0 18px 0;">O que deseja editar?</p>

                <button id="btnEscolhaMov" type="button" style="
                    width:100%;
                    margin-bottom:10px;
                    padding:14px;
                    border:none;
                    border-radius:12px;
                    background:linear-gradient(90deg,#2f80ed,#2563eb);
                    color:#fff;
                    font-weight:700;
                    font-size:16px;
                ">Editar Movimentação</button>

                <button id="btnEscolhaTransf" type="button" style="
                    width:100%;
                    margin-bottom:10px;
                    padding:14px;
                    border:none;
                    border-radius:12px;
                    background:linear-gradient(90deg,#22c55e,#16a34a);
                    color:#fff;
                    font-weight:700;
                    font-size:16px;
                ">Editar Transferência</button>

                <button id="btnFecharEscolha" type="button" style="
                    width:100%;
                    padding:14px;
                    border:none;
                    border-radius:12px;
                    background:linear-gradient(90deg,#ef4444,#dc2626);
                    color:#fff;
                    font-weight:700;
                    font-size:16px;
                ">Cancelar</button>
            </div>
        `;

        document.body.appendChild(modal);

        modal.addEventListener("click", function(e){
            if(e.target === modal) modal.remove();
        });

        modal.querySelector("#btnFecharEscolha").onclick = ()=> modal.remove();
        modal.querySelector("#btnEscolhaMov").onclick = ()=> { modal.remove(); preencherFormularioMovimentacao(); };
        modal.querySelector("#btnEscolhaTransf").onclick = ()=> { modal.remove(); preencherFormularioTransferencia(); };

        return modal;
    }

    function preencherFormularioMovimentacao(){
        const secao = encontrarSecaoPorTitulo("Nova Movimentação") || encontrarSecaoPorTitulo("Editar Movimentação");
        if(!secao){
            alert("Formulário de movimentação não encontrado.");
            return;
        }

        const dados = itemEdicaoAtual || {};
        const inputs = pegarInputsDaSecao(secao);

        const inputProduto = preencherPorPlaceholder(inputs, ["código", "codigo", "produto", "nome"], dados.codigo || dados.produto || "");
        const inputEndereco = preencherPorPlaceholder(inputs, ["endereço wms", "endereco wms", "endereço", "endereco"], dados.endereco || "");
        const inputQtd = preencherPorPlaceholder(inputs, ["quantidade", "qtd"], dados.qtd || "");

        const selectTipo = inputs.find(el => el.tagName === "SELECT");
        if(selectTipo && dados.tipo){
            const tipo = dados.tipo.toLowerCase().replace("saída","saida").replace("transferência","transferencia");
            const op = [...selectTipo.options].find(o =>
                o.value.toLowerCase().includes(tipo) || o.textContent.toLowerCase().includes(tipo)
            );
            if(op){
                selectTipo.value = op.value;
                dispararEventos(selectTipo);
            }
        }

        secao.scrollIntoView({ behavior:"smooth", block:"center" });
    }

    function preencherFormularioTransferencia(){
        const secao = encontrarSecaoPorTitulo("Transferência entre Endereços") || encontrarSecaoPorTitulo("Transferencia entre Enderecos");
        if(!secao){
            alert("Formulário de transferência não encontrado.");
            return;
        }

        const dados = itemEdicaoAtual || {};
        const inputs = pegarInputsDaSecao(secao);

        preencherPorPlaceholder(inputs, ["código", "codigo", "produto", "nome"], dados.codigo || dados.produto || "");
        preencherPorPlaceholder(inputs, ["origem"], dados.origem || dados.endereco || "");
        preencherPorPlaceholder(inputs, ["destino"], dados.destino || "");
        preencherPorPlaceholder(inputs, ["quantidade", "qtd"], dados.qtd || "");

        const btn = [...secao.querySelectorAll("button")].find(b => /transferir|salvar edição de transferência/i.test(normalizarTexto(b.textContent)));
        if(btn){
            btn.textContent = "Salvar Edição de Transferência";
            btn.dataset.modoEdicaoTransferencia = "1";
        }

        secao.scrollIntoView({ behavior:"smooth", block:"center" });
    }

    document.addEventListener("click", function(e){
        const botao = e.target.closest("button");
        if(!botao) return;
        if(normalizarTexto(botao.textContent).toLowerCase() !== "editar") return;

        e.preventDefault();
        e.stopImmediatePropagation();

        itemEdicaoAtual = extrairDadosDaLinha(botao);
        garantirModalEscolha();
    }, true);

})();
</script>
<!-- FIM INTERCEPT EDITAR ESTOQUE -->

<script>
(function(){
    let pedidosProdutosCache = [];
    let pedidoProdutoSelecionado = null;
    let pedidoItens = [];

    function txt(v){
        return String(v || "").trim();
    }

    function norm(v){
        return txt(v).normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
    }

    function num(v){
        const n = Number(String(v ?? "").replace(",", "."));
        return isNaN(n) ? 0 : n;
    }

    function calcularDetalhes(quantidadeTotal, fator){
        quantidadeTotal = Math.max(0, Math.floor(num(quantidadeTotal)));
        fator = Math.max(1, Math.floor(num(fator)));
        const caixasFechadas = Math.floor(quantidadeTotal / fator);
        const unidadesAvulsas = quantidadeTotal % fator;
        return {
            quantidadeTotal,
            fator,
            caixasFechadas,
            unidadesAvulsas
        };
    }

    async function carregarProdutosPedido(){
        const fontes = [
            "/api/produtos",
            "/data/produtos.json"
        ];

        for(const url of fontes){
            try{
                const r = await fetch(url, { cache: "no-store" });
                if(!r.ok) continue;
                const data = await r.json();

                if(Array.isArray(data)){
                    pedidosProdutosCache = data;
                    return;
                }

                if(Array.isArray(data.produtos)){
                    pedidosProdutosCache = data.produtos;
                    return;
                }
            }catch(e){}
        }

        pedidosProdutosCache = [
            { codigo:"TST001", nome:"Caixa Organizadora Média", fator:12, imagem:"" },
            { codigo:"TST002", nome:"Plástico Bolha Premium", fator:10, imagem:"" },
            { codigo:"TST003", nome:"Etiqueta Logística", fator:20, imagem:"" },
            { codigo:"TST004", nome:"Papel Kraft Bobina", fator:15, imagem:"" },
            { codigo:"TST005", nome:"Fita Adesiva Transparente", fator:6, imagem:"" }
        ];
    }

    function getCodigo(p){
        return txt(p.codigo || p.code || p.sku || "");
    }

    function getNome(p){
        return txt(p.nome || p.name || p.descricao || "Produto");
    }

    function getFator(p){
        const f = Number(p.fator || p.fatorConversao || p.fator_conversao || p.caixa || 1);
        return isNaN(f) || f <= 0 ? 1 : f;
    }

    function getImagem(p){
        return txt(p.imagem || p.image || p.foto || "");
    }

    function criarModalAdicionarProduto(){
        if(document.getElementById("modalProdutoPedido")) return;

        const modal = document.createElement("div");
        modal.id = "modalProdutoPedido";
        modal.style.display = "none";
        modal.style.position = "fixed";
        modal.style.inset = "0";
        modal.style.background = "rgba(0,0,0,.75)";
        modal.style.zIndex = "99999";
        modal.style.alignItems = "center";
        modal.style.justifyContent = "center";
        modal.style.padding = "20px";

        modal.innerHTML = `
            <div style="
                width:100%;
                max-width:620px;
                background:#162742;
                border-radius:18px;
                padding:20px;
                box-shadow:0 0 30px rgba(0,0,0,.45);
                max-height:85vh;
                overflow:auto;
            ">
                <h3 style="color:#fff;margin:0 0 14px 0;">Adicionar Produto</h3>

                <input
                    id="pesquisaProdutoPedido"
                    type="text"
                    placeholder="Pesquisar produto..."
                    style="
                        width:100%;
                        padding:14px;
                        border:none;
                        border-radius:10px;
                        margin-bottom:14px;
                        background:#0b1730;
                        color:#fff;
                        outline:none;
                    "
                >

                <div id="listaBuscaProdutosPedido" style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px;"></div>

                <div id="boxQuantidadePedido" style="
                    display:none;
                    background:#0b1730;
                    border-radius:14px;
                    padding:14px;
                    margin-bottom:14px;
                ">
                    <div style="color:#fff;font-weight:800;margin-bottom:10px;" id="tituloProdutoSelecionadoPedido">Produto</div>

                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                        <div>
                            <label style="display:block;color:#dbe7ff;font-size:12px;font-weight:700;margin-bottom:6px;">Quantidade Total (UN)</label>
                            <input
                                id="quantidadeTotalPedido"
                                type="number"
                                min="1"
                                step="1"
                                value="1"
                                style="
                                    width:100%;
                                    padding:12px;
                                    border:none;
                                    border-radius:10px;
                                    background:#162742;
                                    color:#fff;
                                    outline:none;
                                "
                            >
                        </div>

                        <div>
                            <label style="display:block;color:#dbe7ff;font-size:12px;font-weight:700;margin-bottom:6px;">Fator Conversão</label>
                            <input
                                id="fatorConversaoPedido"
                                type="text"
                                readonly
                                style="
                                    width:100%;

                        background:#475569;

                        border:none;

                        color:#fff;
                        font-weight:700;

                </div>
            </div>

        document.body.appendChild(modal);

        modal.addEventListener("click", function(e){

            }

        document.getElementById("btnCancelarProdutoPedido").onclick = fecharModalProdutoPedido;
        document.getElementById("btnConfirmarProdutoPedido").onclick = confirmarProdutoPedido;

        document.getElementById("pesquisaProdutoPedido").addEventListener("input", function(){
            renderListaBuscaProdutos(this.value);
        });

        document.getElementById("quantidadeTotalPedido").addEventListener("input", atualizarPreviewQuantidadePedido);
    }

    function abrirModalProdutoPedido(){
        const modal = document.getElementById("modalProdutoPedido");
        if(!modal) return;
        pedidoProdutoSelecionado = null;
        modal.style.display = "flex";

        const input = document.getElementById("pesquisaProdutoPedido");
        const qtd = document.getElementById("quantidadeTotalPedido");
        const fator = document.getElementById("fatorConversaoPedido");
        const box = document.getElementById("boxQuantidadePedido");
        const titulo = document.getElementById("tituloProdutoSelecionadoPedido");
        const cx = document.getElementById("caixasFechadasPedido");
        const av = document.getElementById("unidadesAvulsasPedido");

        if(input){
            input.value = "";
            input.focus();
        }
        if(qtd) qtd.value = "1";
        if(fator) fator.value = "";
        if(box) box.style.display = "none";
        if(titulo) titulo.textContent = "Produto";
        if(cx) cx.textContent = "0";
        if(av) av.textContent = "0";

        renderListaBuscaProdutos("");
    }

    function fecharModalProdutoPedido(){
        const modal = document.getElementById("modalProdutoPedido");
        if(modal) modal.style.display = "none";
    }

    function atualizarPreviewQuantidadePedido(){
        if(!pedidoProdutoSelecionado) return;

        const qtdInput = document.getElementById("quantidadeTotalPedido");
        const fatorInput = document.getElementById("fatorConversaoPedido");
        const cxEl = document.getElementById("caixasFechadasPedido");
        const avEl = document.getElementById("unidadesAvulsasPedido");

        const fator = getFator(pedidoProdutoSelecionado);
        const quantidade = Math.max(1, Math.floor(num(qtdInput ? qtdInput.value : 1)));
        const calc = calcularDetalhes(quantidade, fator);

        if(qtdInput) qtdInput.value = String(calc.quantidadeTotal);
        if(fatorInput) fatorInput.value = `${calc.fator} un/cx`;
        if(cxEl) cxEl.textContent = String(calc.caixasFechadas);
        if(avEl) avEl.textContent = String(calc.unidadesAvulsas);
    }

    function selecionarProdutoPedido(produto, busca){
        pedidoProdutoSelecionado = produto;

        const box = document.getElementById("boxQuantidadePedido");
        const titulo = document.getElementById("tituloProdutoSelecionadoPedido");
        const fatorInput = document.getElementById("fatorConversaoPedido");
        const qtdInput = document.getElementById("quantidadeTotalPedido");

        if(box) box.style.display = "block";
        if(titulo) titulo.textContent = `${getCodigo(produto)} - ${getNome(produto)}`;
        if(fatorInput) fatorInput.value = `${getFator(produto)} un/cx`;
        if(qtdInput) qtdInput.value = "1";

        atualizarPreviewQuantidadePedido();
        renderListaBuscaProdutos(busca);
    }

    function renderListaBuscaProdutos(busca){
        const lista = document.getElementById("listaBuscaProdutosPedido");
        if(!lista) return;

        const termo = norm(busca);
        const filtrados = pedidosProdutosCache.filter(p => {
            const c = norm(getCodigo(p));
            const n = norm(getNome(p));
            return !termo || c.includes(termo) || n.includes(termo);
        });

        if(!filtrados.length){
            lista.innerHTML = `<div style="color:#cbd5e1;padding:8px 2px;">Nenhum produto encontrado.</div>`;
            return;
        }

        lista.innerHTML = filtrados.map((p, i) => {
            const codigo = getCodigo(p);
            const nome = getNome(p);
            const fator = getFator(p);
            const img = getImagem(p);
            const selected = pedidoProdutoSelecionado && getCodigo(pedidoProdutoSelecionado) === codigo;

            const thumb = img
                ? `<img src="${img}" style="width:52px;height:52px;object-fit:cover;border-radius:10px;">`
                : `<div style="width:52px;height:52px;border-radius:10px;background:#0b1730;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;">IMG</div>`;

            return `
                <div
                    data-prod-idx="${i}"
                    style="
                        display:grid;
                        grid-template-columns:52px 1fr;
                        gap:10px;
                        align-items:center;
                        background:${selected ? "#2f6df6" : "#0b1730"};
                        border-radius:12px;
                        padding:10px;
                        cursor:pointer;
                        border:${selected ? "1px solid rgba(255,255,255,.35)" : "1px solid transparent"};
                    "
                >
                    ${thumb}
                    <div>
                        <div style="color:#fff;font-weight:800;font-size:13px;">${codigo}</div>
                        <div style="color:#dbe7ff;font-size:14px;">${nome}</div>
                        <div style="color:#7fb0ff;font-size:12px;">Fator: ${fator}</div>
                    </div>
                </div>
            `;
        }).join("");

        Array.from(lista.querySelectorAll("[data-prod-idx]")).forEach((el, idx) => {
            el.onclick = function(){
                selecionarProdutoPedido(filtrados[idx], busca);
            };
        });
    }

    function garantirAreaItensPedido(){
        const titulo = Array.from(document.querySelectorAll("*"))
            .find(el => txt(el.innerText) === "Itens do Pedido");

        if(!titulo) return null;

        const card = titulo.closest("div");
        if(!card) return null;

        let lista = document.getElementById("listaItensPedidoReal");
        if(!lista){
            const antigo = Array.from(card.querySelectorAll("div"))
                .find(el => txt(el.innerText) === "Nenhum item adicionado.");
            if(antigo) antigo.remove();

            lista = document.createElement("div");
            lista.id = "listaItensPedidoReal";
            lista.style.display = "flex";
            lista.style.flexDirection = "column";
            lista.style.gap = "12px";
            card.appendChild(lista);
        }

        let resumo = document.getElementById("resumoItensPedidoReal");
        if(!resumo){
            resumo = document.createElement("div");
            resumo.id = "resumoItensPedidoReal";
            resumo.style.marginTop = "14px";
            resumo.style.background = "#162742";
            resumo.style.padding = "14px";
            resumo.style.borderRadius = "12px";
            resumo.style.color = "#fff";
            resumo.style.fontWeight = "700";
            card.appendChild(resumo);
        }

        return { card, lista, resumo };
    }

    function renderResumoPedido(){
        const area = garantirAreaItensPedido();
        if(!area || !area.resumo) return;

        const totalItens = pedidoItens.length;
        const totalUN = pedidoItens.reduce((acc, it) => acc + num(it.quantidadeTotal), 0);
        const totalCX = pedidoItens.reduce((acc, it) => acc + num(it.caixasFechadas), 0);
        const totalAv = pedidoItens.reduce((acc, it) => acc + num(it.unidadesAvulsas), 0);

        area.resumo.innerHTML = `
            <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;">
                <div>
                    <div style="font-size:12px;color:#cbd5e1;">Total de Itens</div>
                    <div style="font-size:20px;">${totalItens}</div>
                </div>
                <div>
                    <div style="font-size:12px;color:#cbd5e1;">Total UN</div>
                    <div style="font-size:20px;">${totalUN}</div>
                </div>
                <div>
                    <div style="font-size:12px;color:#cbd5e1;">Total CX Fechadas</div>
                    <div style="font-size:20px;">${totalCX}</div>
                </div>
                <div>
                    <div style="font-size:12px;color:#cbd5e1;">UN Avulsas</div>
                    <div style="font-size:20px;">${totalAv}</div>
                </div>
            </div>
        `;
    }

    function renderItensPedido(){
        const area = garantirAreaItensPedido();
        if(!area || !area.lista) return;

        if(!pedidoItens.length){
            area.lista.innerHTML = `<div style="color:#cbd5e1;">Nenhum item adicionado.</div>`;
            renderResumoPedido();
            return;
        }

        area.lista.innerHTML = pedidoItens.map((item, index) => {
            const thumb = item.imagem
                ? `<img src="${item.imagem}" style="width:56px;height:56px;object-fit:cover;border-radius:10px;">`
                : `<div style="width:56px;height:56px;border-radius:10px;background:#2f6df6;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:800;">IMG</div>`;

            return `
                <div style="
                    display:grid;
                    grid-template-columns:56px 1fr auto;
                    gap:12px;
                    align-items:center;
                    background:#162742;
                    padding:14px;
                    border-radius:12px;
                ">
                    ${thumb}

                    <div style="display:flex;flex-direction:column;gap:4px;color:#fff;">
                        <div style="font-weight:800;">${item.codigo} - ${item.nome}</div>
                        <div style="color:#7fb0ff;font-size:12px;">Fator Conversão: ${item.fator} un/cx</div>
                        <div style="color:#dbe7ff;font-size:13px;">Quantidade Total: ${item.quantidadeTotal} un</div>
                        <div style="color:#dbe7ff;font-size:13px;">Caixas Fechadas: ${item.caixasFechadas}</div>
                        <div style="color:#dbe7ff;font-size:13px;">Unidades Avulsas: ${item.unidadesAvulsas}</div>
                    </div>

                    <div style="display:flex;flex-direction:column;gap:8px;align-items:center;">
                        <div style="font-size:20px;">✅</div>
                        <button
                            data-remove-item="${index}"
                            style="
                                border:none;
                                border-radius:10px;
                                background:#ef4444;
                                color:#fff;
                                padding:8px 10px;
                                cursor:pointer;
                                font-weight:700;
                            "
                        >Remover</button>
                    </div>
                </div>
            `;
        }).join("");

        Array.from(area.lista.querySelectorAll("[data-remove-item]")).forEach(btn => {
            btn.onclick = function(){
                const idx = Number(this.getAttribute("data-remove-item"));
                pedidoItens.splice(idx, 1);
                renderItensPedido();
            };
        });

        renderResumoPedido();
    }

    function confirmarProdutoPedido(){
        if(!pedidoProdutoSelecionado) return;

        const qtdInput = document.getElementById("quantidadeTotalPedido");
        const quantidade = Math.max(1, Math.floor(num(qtdInput ? qtdInput.value : 1)));

        const codigo = getCodigo(pedidoProdutoSelecionado);
        const nome = getNome(pedidoProdutoSelecionado);
        const fator = getFator(pedidoProdutoSelecionado);
        const imagem = getImagem(pedidoProdutoSelecionado);

        const existente = pedidoItens.find(it => it.codigo === codigo);

        if(existente){
            const novaQuantidade = num(existente.quantidadeTotal) + quantidade;
            const calc = calcularDetalhes(novaQuantidade, fator);
            existente.quantidadeTotal = calc.quantidadeTotal;
            existente.caixasFechadas = calc.caixasFechadas;
            existente.unidadesAvulsas = calc.unidadesAvulsas;
        }else{
            const calc = calcularDetalhes(quantidade, fator);
            pedidoItens.push({
                codigo,
                nome,
                imagem,
                fator: calc.fator,
                quantidadeTotal: calc.quantidadeTotal,
                caixasFechadas: calc.caixasFechadas,
                unidadesAvulsas: calc.unidadesAvulsas
            });
        }

        renderItensPedido();
        fecharModalProdutoPedido();
    }

    function bindBotaoAdicionarProduto(){
        const btn = Array.from(document.querySelectorAll("button"))
            .find(el => txt(el.innerText).includes("+ Adicionar Produto"));

        if(!btn || btn.dataset.pedidoBindOk === "1") return;

        btn.dataset.pedidoBindOk = "1";
        btn.addEventListener("click", function(e){
            e.preventDefault();
            abrirModalProdutoPedido();
        });
    }

    async function initPedidosAdicionarProduto(){
        await carregarProdutosPedido();
        criarModalAdicionarProduto();
        bindBotaoAdicionarProduto();
        renderItensPedido();
    }

    if(document.readyState === "loading"){
        document.addEventListener("DOMContentLoaded", initPedidosAdicionarProduto);
    }else{
        initPedidosAdicionarProduto();
    }

    setTimeout(initPedidosAdicionarProduto, 500);
    setTimeout(initPedidosAdicionarProduto, 1500);
    setTimeout(initPedidosAdicionarProduto, 3000);
})();
</script>
<!-- FIM PEDIDOS ADD PRODUTO SAFE -->

</body>
