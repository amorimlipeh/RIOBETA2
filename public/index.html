
<!DOCTYPE html>
<html>
<head>
<meta name=viewport content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;background:#0b1f3a;color:#fff;margin:0}
.menu{padding:10px;background:#1f3b73}
button{width:100%;margin:5px 0;padding:12px;border:none;border-radius:10px;background:#3b5bbf;color:#fff}
.grid{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;padding:10px}
.cell{padding:10px;border-radius:6px;text-align:center;font-size:12px;cursor:pointer}
.vazio{background:#fff;color:#000}
.ocupado{background:#2ecc71}
</style>
</head>
<body>

<div class=menu>
<button onclick="carregar()">Mapa WMS</button>
</div>

<div id=grid class=grid></div>

<script>
async function carregar(){
 const estoque=await fetch('/api/estoque').then(r=>r.json())
 let mapa={}

 estoque.forEach(i=>{
   mapa[i.endereco]=i
 })

 let html=''
 for(let i=1;i<=20;i++){
   let pos=String(i).padStart(3,'0')
   let addr='05-'+pos+'-3-1'
   if(mapa[addr]){
     html+=`<div class="cell ocupado" onclick="detalhe('${addr}')">${pos}</div>`
   }else{
     html+=`<div class="cell vazio">${pos}</div>`
   }
 }
 grid.innerHTML=html
}

function detalhe(addr){
 fetch('/api/estoque').then(r=>r.json()).then(data=>{
   let item=data.find(i=>i.endereco===addr)
   if(item){
     alert(item.nome+'\nQtd:'+item.qtd+'\n'+addr)
   }
 })
}

carregar()
</script>

</body>
</html>
