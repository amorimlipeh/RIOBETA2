
<!DOCTYPE html>
<html>
<head>
<meta name=viewport content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;background:#0b1f3a;color:#fff;margin:0}
.box{padding:20px}
.card{background:#1a2f5c;padding:15px;border-radius:10px;margin:10px 0}
.green{color:#2ecc71}
.red{color:#e74c3c}
</style>
</head>
<body>

<div class=box>
<h2>IA Operacional</h2>

<div id=app></div>

</div>

<script>
async function load(){
 const d=await fetch('/api/ia').then(r=>r.json())

 app.innerHTML=`
 <div class=card>
 <h3>Ranking</h3>
 ${d.ranking.map((o,i)=>`${i+1}º ${o.nome} (${o.itens} itens)`).join('<br>')}
 </div>

 <div class=card>
 <h3>Média tempo</h3>
 ${d.media}s
 </div>

 <div class=card>
 <h3>Gargalo</h3>
 ${d.gargalo?'<span class=red>'+d.gargalo.nome+'</span>':'Nenhum'}
 </div>

 <div class=card>
 <h3>Sugestão</h3>
 <span class=green>${d.sugestao}</span>
 </div>
 `
}

load()
</script>

</body>
</html>
