<!-- INICIO INTERCEPT EDITAR ESTOQUE -->
<script>
(function(){
    let itemEdicaoAtual = null;

    function normalizarTexto(v){
        return String(v || "").replace(/\s+/g, " ").trim();
    }

    function dispararEventos(el){
        if(!el) return;
        el.dispatchEvent(new Event("input", { bubbles:true }));
        el.dispatchEvent(new Event("change", { bubbles:true }));
        el.dispatchEvent(new Event("blur", { bubbles:true }));
    }

    function setValor(el, valor){
        if(!el) return;
        el.value = valor ?? "";
        dispararEventos(el);
    }

    function encontrarSecaoPorTitulo(titulo){
        const alvos = [...document.querySelectorAll("h1,h2,h3,h4,h5,h6,strong,label,div")];
        const node = alvos.find(el => normalizarTexto(el.textContent).toLowerCase() === titulo.toLowerCase());
        if(!node) return null;
        return node.closest(".card, .bloco, .box, section, .modulo-card, .painel, div") || node.parentElement;
    }

    function pegarInputsDaSecao(secao){
        if(!secao) return [];
        return [...secao.querySelectorAll("input, select, textarea")];
    }

    function preencherPorPlaceholder(inputs, termos, valor){
        const alvo = inputs.find(el=>{
            const p = normalizarTexto(el.placeholder).toLowerCase();
            const n = normalizarTexto(el.name).toLowerCase();
            const i = normalizarTexto(el.id).toLowerCase();
            return termos.some(t => p.includes(t) || n.includes(t) || i.includes(t));
        });
        if(alvo) setValor(alvo, valor);
        return alvo;
    }

    function linhasDeTabela(secao){
        if(!secao) return [];
        return [...secao.querySelectorAll("tr")].filter(tr => {
            const tds = tr.querySelectorAll("td,th");
            return tds.length > 0;
        });
    }

    function extrairTextoLinha(tr){
        return [...tr.querySelectorAll("td,th,span,div")].map(x => normalizarTexto(x.textContent)).filter(Boolean);
    }

    function pareceCodigo(txt){
        return /^[a-z]{2,}\d+[a-z0-9]*$/i.test(txt || "");
    }

    function pareceEndereco(txt){
        return /(^\d{6,8}$)|(^\d{2}[-/]\d{3}[-/]\d[-/]\d$)/.test(txt || "");
    }

    function pareceNumero(txt){
        return /^\d+[.,]?\d*$/.test((txt || "").replace(/\s/g,''));
    }

    function buscarFallbackProdutoEnderecoQtd(){
        const out = { codigo:"", produto:"", endereco:"", qtd:"" };

        const secaoSaldo = encontrarSecaoPorTitulo("Saldo Consolidado por Produto");
        const secaoEndereco = encontrarSecaoPorTitulo("Estoque por Endereço") || encontrarSecaoPorTitulo("Estoque por Endereco");

        if(secaoSaldo){
            const trs = linhasDeTabela(secaoSaldo);
            for(const tr of trs){
                const vals = extrairTextoLinha(tr);
                const codigo = vals.find(v => pareceCodigo(v));
                const produto = vals.find(v => /[a-zà-ú]/i.test(v) && !pareceCodigo(v) && !pareceNumero(v) && !pareceEndereco(v));
                if(codigo && produto){
                    out.codigo = codigo;
                    out.produto = produto;
                    break;
                }
            }
        }

        if(secaoEndereco){
            const trs = linhasDeTabela(secaoEndereco);
            for(const tr of trs){
                const vals = extrairTextoLinha(tr);
                const endereco = vals.find(v => pareceEndereco(v));
                const qtd = vals.find(v => pareceNumero(v) && !pareceEndereco(v));
                const produto = vals.find(v => /[a-zà-ú]/i.test(v) && !pareceCodigo(v) && !pareceNumero(v) && !pareceEndereco(v));
                if(produto && !out.produto) out.produto = produto;
                if(endereco && !out.endereco) out.endereco = endereco;
                if(qtd && !out.qtd) out.qtd = qtd;
                if(out.endereco && out.qtd) break;
            }
        }

        return out;
    }

    function extrairDadosDaLinha(botao){
        const linha = botao.closest("tr") || botao.closest(".linha") || botao.closest(".card") || botao.parentElement;
        const celulas = linha ? [...linha.querySelectorAll("td,th,span,div")].map(x => normalizarTexto(x.textContent)).filter(Boolean) : [];

        const dados = {
            bruto: celulas,
            produto: "",
            codigo: "",
            tipo: "",
            endereco: "",
            origem: "",
            destino: "",
            qtd: "",
            datahora: ""
        };

        for(const c of celulas){
            const low = c.toLowerCase();

            if(!dados.tipo && ["entrada","saida","saída","transferencia","transferência","ajuste"].includes(low)){
                dados.tipo = c;
                continue;
            }

            if(!dados.endereco && pareceEndereco(c)){
                dados.endereco = c;
                continue;
            }

            if(!dados.codigo && pareceCodigo(c)){
                dados.codigo = c;
                continue;
            }

            if(!dados.qtd && pareceNumero(c) && !pareceEndereco(c) && c.length <= 8){
                dados.qtd = c;
                continue;
            }

            if(!dados.produto && /[a-zà-ú]/i.test(c) && !/editar|cancelar|ativo|status|ação|acao|entrada|sa[ií]da|transfer/i.test(low) && !pareceCodigo(c)){
                dados.produto = c;
            }
        }

        const fallback = buscarFallbackProdutoEnderecoQtd();

        if(!dados.codigo) dados.codigo = fallback.codigo || "";
        if(!dados.produto) dados.produto = fallback.produto || "";
        if(!dados.endereco) dados.endereco = fallback.endereco || "";
        if(!dados.qtd) dados.qtd = fallback.qtd || "";

        if(!dados.origem) dados.origem = dados.endereco || "";
        if(!dados.destino) dados.destino = "";

        return dados;
    }

    function garantirModalEscolha(){
        let modal = document.getElementById("modalEscolhaTipoEdicao");
        if(modal) return modal;

        modal = document.createElement("div");
        modal.id = "modalEscolhaTipoEdicao";
        modal.style.cssText = `
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.75);
            display:flex;
            align-items:center;
            justify-content:center;
            z-index:999999;
            padding:16px;
        `;

        modal.innerHTML = `
            <div style="
                background:linear-gradient(180deg,#1e293b 0%, #162033 100%);
                padding:24px;
                border-radius:16px;
                width:min(92vw, 400px);
                text-align:center;
                box-shadow:0 20px 55px rgba(0,0,0,.45);
                border:1px solid rgba(255,255,255,.06);
            ">
                <h2 style="color:#fff;margin:0 0 10px 0;font-size:24px;">Selecionar Tipo de Edição</h2>
                <p style="color:#d7deea;margin:0 0 18px 0;">O que deseja editar?</p>

                <button id="btnEscolhaMov" type="button" style="
                    width:100%;
                    margin-bottom:10px;
                    padding:14px;
                    border:none;
                    border-radius:12px;
                    background:linear-gradient(90deg,#2f80ed,#2563eb);
                    color:#fff;
                    font-weight:700;
                    font-size:16px;
                ">Editar Movimentação</button>

                <button id="btnEscolhaTransf" type="button" style="
                    width:100%;
                    margin-bottom:10px;
                    padding:14px;
                    border:none;
                    border-radius:12px;
                    background:linear-gradient(90deg,#22c55e,#16a34a);
                    color:#fff;
                    font-weight:700;
                    font-size:16px;
                ">Editar Transferência</button>

                <button id="btnFecharEscolha" type="button" style="
                    width:100%;
                    padding:14px;
                    border:none;
                    border-radius:12px;
                    background:linear-gradient(90deg,#ef4444,#dc2626);
                    color:#fff;
                    font-weight:700;
                    font-size:16px;
                ">Cancelar</button>
            </div>
        `;

        document.body.appendChild(modal);

        modal.addEventListener("click", function(e){
            if(e.target === modal) modal.remove();
        });

        modal.querySelector("#btnFecharEscolha").onclick = ()=> modal.remove();
        modal.querySelector("#btnEscolhaMov").onclick = ()=> { modal.remove(); preencherFormularioMovimentacao(); };
        modal.querySelector("#btnEscolhaTransf").onclick = ()=> { modal.remove(); preencherFormularioTransferencia(); };

        return modal;
    }

    function preencherFormularioMovimentacao(){
        const secao = encontrarSecaoPorTitulo("Nova Movimentação") || encontrarSecaoPorTitulo("Editar Movimentação");
        if(!secao){
            alert("Formulário de movimentação não encontrado.");
            return;
        }

        const dados = itemEdicaoAtual || {};
        const inputs = pegarInputsDaSecao(secao);

        const inputProduto = preencherPorPlaceholder(inputs, ["código", "codigo", "produto", "nome"], dados.codigo || dados.produto || "");
        const inputEndereco = preencherPorPlaceholder(inputs, ["endereço wms", "endereco wms", "endereço", "endereco"], dados.endereco || "");
        const inputQtd = preencherPorPlaceholder(inputs, ["quantidade", "qtd"], dados.qtd || "");

        const selectTipo = inputs.find(el => el.tagName === "SELECT");
        if(selectTipo && dados.tipo){
            const tipo = dados.tipo.toLowerCase().replace("saída","saida").replace("transferência","transferencia");
            const op = [...selectTipo.options].find(o =>
                o.value.toLowerCase().includes(tipo) || o.textContent.toLowerCase().includes(tipo)
            );
            if(op){
                selectTipo.value = op.value;
                dispararEventos(selectTipo);
            }
        }

        secao.scrollIntoView({ behavior:"smooth", block:"center" });
    }

    function preencherFormularioTransferencia(){
        const secao = encontrarSecaoPorTitulo("Transferência entre Endereços") || encontrarSecaoPorTitulo("Transferencia entre Enderecos");
        if(!secao){
            alert("Formulário de transferência não encontrado.");
            return;
        }

        const dados = itemEdicaoAtual || {};
        const inputs = pegarInputsDaSecao(secao);

        preencherPorPlaceholder(inputs, ["código", "codigo", "produto", "nome"], dados.codigo || dados.produto || "");
        preencherPorPlaceholder(inputs, ["origem"], dados.origem || dados.endereco || "");
        preencherPorPlaceholder(inputs, ["destino"], dados.destino || "");
        preencherPorPlaceholder(inputs, ["quantidade", "qtd"], dados.qtd || "");

        const btn = [...secao.querySelectorAll("button")].find(b => /transferir|salvar edição de transferência/i.test(normalizarTexto(b.textContent)));
        if(btn){
            btn.textContent = "Salvar Edição de Transferência";
            btn.dataset.modoEdicaoTransferencia = "1";
        }

        secao.scrollIntoView({ behavior:"smooth", block:"center" });
    }

    document.addEventListener("click", function(e){
        const botao = e.target.closest("button");
        if(!botao) return;
        if(normalizarTexto(botao.textContent).toLowerCase() !== "editar") return;

        e.preventDefault();
        e.stopImmediatePropagation();

        itemEdicaoAtual = extrairDadosDaLinha(botao);
        garantirModalEscolha();
    }, true);

})();
</script>
<!-- FIM INTERCEPT EDITAR ESTOQUE -->














</body>
</html>
